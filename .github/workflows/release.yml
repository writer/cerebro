name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.2.3). Must start with v.'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
          else
            tag="${{ inputs.release_tag }}"
          fi
          if [[ ! "${tag}" =~ ^v ]]; then
            echo "ERROR: tag '${tag}' must start with 'v'"
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${tag}"

  goreleaser:
    runs-on: ubuntu-latest
    needs: [resolve-tag]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ghcr-publish:
    runs-on: ubuntu-latest
    needs: [resolve-tag, goreleaser]
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push linux/amd64
        shell: bash
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p .dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -buildvcs=false -trimpath -ldflags="-s -w" -o .dist/cerebro ./cmd/cerebro
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.runtime \
            -t "${IMAGE_BASE}:${RELEASE_TAG}-amd64" \
            --provenance=false \
            --push .

      - name: Build and push linux/arm64
        shell: bash
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -buildvcs=false -trimpath -ldflags="-s -w" -o .dist/cerebro ./cmd/cerebro
          docker buildx build --platform linux/arm64 \
            -f Dockerfile.runtime \
            -t "${IMAGE_BASE}:${RELEASE_TAG}-arm64" \
            --provenance=false \
            --push .

      - name: Create and push multi-arch manifests
        shell: bash
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          docker manifest create "${IMAGE_BASE}:${RELEASE_TAG}" \
            "${IMAGE_BASE}:${RELEASE_TAG}-amd64" \
            "${IMAGE_BASE}:${RELEASE_TAG}-arm64"
          docker manifest push "${IMAGE_BASE}:${RELEASE_TAG}"

          docker manifest create "${IMAGE_BASE}:latest" \
            "${IMAGE_BASE}:${RELEASE_TAG}-amd64" \
            "${IMAGE_BASE}:${RELEASE_TAG}-arm64"
          docker manifest push "${IMAGE_BASE}:latest"
