name: Security Source Scan

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gosec-source-scan:
    name: gosec-source-scan shard ${{ matrix.shard_index }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3]
        shard_total: [4]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.24.7

      - name: Run gosec shard (JSON report)
        shell: bash
        run: |
          set -euo pipefail
          report_path="gosec-report-${{ matrix.shard_index }}.json"
          mapfile -t all_packages < <(go list -f '{{.Dir}}' ./...)
          selected=()
          for i in "${!all_packages[@]}"; do
            if (( i % ${{ matrix.shard_total }} == ${{ matrix.shard_index }} )); then
              selected+=("${all_packages[$i]}")
            fi
          done
          echo "Running gosec shard ${{ matrix.shard_index }} with ${#selected[@]} packages"
          printf '{"Issues":[],"Golang errors":[]}' > "${report_path}"
          if [ "${#selected[@]}" -eq 0 ]; then
            exit 0
          fi
          tmp_dir=$(mktemp -d)
          idx=0
          for pkg in "${selected[@]}"; do
            echo "Scanning ${pkg}"
            tmp_report="${tmp_dir}/report-${idx}.json"
            "$(go env GOPATH)/bin/gosec" -severity medium -confidence medium -exclude-generated -fmt=json -out "${tmp_report}" "${pkg}" || true
            idx=$((idx + 1))
          done
          python3 - "${report_path}" "${tmp_dir}" <<'PY'
          import glob
          import json
          import os
          import sys

          merged = []
          golang_errors = []

          def extend_errors(value):
              if not value:
                  return
              if isinstance(value, list):
                  golang_errors.extend(value)
                  return
              golang_errors.append(value)

          report_path, tmp_dir = sys.argv[1], sys.argv[2]
          for path in sorted(glob.glob(os.path.join(tmp_dir, "report-*.json"))):
              with open(path, encoding="utf-8") as f:
                  data = json.load(f)
              merged.extend(data.get("Issues") or [])
              extend_errors(data.get("Golang errors"))

          with open(report_path, "w", encoding="utf-8") as f:
              json.dump({"Issues": merged, "Golang errors": golang_errors}, f)
          PY

      - name: Fail on HIGH findings or Go analysis errors
        shell: bash
        run: |
          set -euo pipefail
          report_path="gosec-report-${{ matrix.shard_index }}.json"
          python3 - "${report_path}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], 'r', encoding='utf-8') as f:
              data = json.load(f)

          issues = data.get('Issues') or []
          golang_errors = data.get('Golang errors') or []
          if not isinstance(golang_errors, list):
              golang_errors = [golang_errors]
          high = [i for i in issues if str(i.get('severity', '')).upper() == 'HIGH']

          print(f"Total gosec findings: {len(issues)}")
          print(f"HIGH findings: {len(high)}")
          for finding in high:
              print(
                  f"- {finding.get('rule_id')} {finding.get('file')}:{finding.get('line')} "
                  f"{finding.get('details', '').strip()}"
              )

          print(f"Golang errors: {len(golang_errors)}")
          for err in golang_errors:
              if isinstance(err, dict):
                  print(f"- {json.dumps(err, sort_keys=True)}")
              else:
                  print(f"- {err}")

          if high or golang_errors:
              sys.exit(1)
          PY

      - name: Upload gosec report artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gosec-report-${{ matrix.shard_index }}
          path: gosec-report-${{ matrix.shard_index }}.json
