        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.1
          args: --timeout=15m ./cmd/... ./internal/... ./api/...

  gosec-shards:
    name: gosec shard ${{ matrix.shard_index }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3]
        shard_total: [4]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.24.7

      - name: Run gosec shard
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t all_packages < <(go list -f '{{.Dir}}' ./...)
          selected=()
          for i in "${!all_packages[@]}"; do
            if (( i % ${{ matrix.shard_total }} == ${{ matrix.shard_index }} )); then
              selected+=("${all_packages[$i]}")
            fi
          done
          echo "Running gosec shard ${{ matrix.shard_index }} with ${#selected[@]} packages"
          if [ ${#selected[@]} -eq 0 ]; then
            exit 0
          fi
          for pkg in "${selected[@]}"; do
            echo "Scanning ${pkg}"
            $(go env GOPATH)/bin/gosec -quiet -severity medium -confidence medium -exclude-generated "${pkg}"
          done

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    needs: [gosec-shards]
    if: ${{ always() }}
    steps:
      - name: Ensure all gosec shards passed
        run: |
          if [ "${{ needs.gosec-shards.result }}" != "success" ]; then
            echo "One or more gosec shards failed."
            exit 1
          fi

  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Build binaries
        run: |
          go build -o /tmp/cerebro ./cmd/cerebro
          go build -o /tmp/policy-enhancer ./cmd/policy-enhancer

      - name: Run govulncheck
        timeout-minutes: 10
        run: |
          $(go env GOPATH)/bin/govulncheck -mode binary /tmp/cerebro
          $(go env GOPATH)/bin/govulncheck -mode binary /tmp/policy-enhancer

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build image for scanning
        shell: bash
        run: |
          set -euo pipefail
          GO_VERSION="$(./scripts/go_version.sh)"
          VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          docker build --build-arg GO_VERSION="${GO_VERSION}" --build-arg VERSION="${VERSION}" --build-arg COMMIT="${COMMIT}" --build-arg DATE="${DATE}" -f Dockerfile -t cerebro:ci .

      - name: Run Trivy image scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${HOME}/.cache/trivy:/root/.cache/trivy" \
            aquasec/trivy:0.69.1 image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --timeout 15m \
            --db-repository public.ecr.aws/aquasecurity/trivy-db:2 \
            --db-repository ghcr.io/aquasecurity/trivy-db:2 \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            cerebro:ci

  policy-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o cerebro ./cmd/cerebro

      - name: Validate policies
        run: ./cerebro policy validate

  runtime-image-build:
    name: runtime-image-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and validate amd64 runtime image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -buildvcs=false -trimpath -ldflags="-s -w" -o .dist/cerebro ./cmd/cerebro
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.runtime \
            -t cerebro:runtime-ci-amd64 \
            --load .

      - name: Build and validate arm64 runtime image
        shell: bash
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -buildvcs=false -trimpath -ldflags="-s -w" -o .dist/cerebro ./cmd/cerebro
          docker buildx build --platform linux/arm64 \
            -f Dockerfile.runtime \
            -t cerebro:runtime-ci-arm64 \
            --load .
