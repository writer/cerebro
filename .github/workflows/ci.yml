      - name: API auth smoke tests
        run: go test ./internal/api -run 'TestAuthMiddleware_BlocksUnauthenticated|TestAuthMiddleware_AllowsAuthenticated|TestPublicEndpoints_RemainAccessibleWhenAPIAuthEnabled|TestExtractAPIKey|TestAPIKeyAuth_RejectsMalformedAuthorizationEvenWithXAPIKey|TestAPIKeyAuth_RejectsConflictingCredentials|TestAPIKeyAuth_AllowsMatchingCredentialsFromBothHeaders' -count=1
