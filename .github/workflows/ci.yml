name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-shards:
    name: Test shard ${{ matrix.shard_index }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1]
        shard_total: [2]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go module cache
        id: go-mod-cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Restore Go build cache (shard)
        id: go-build-cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-shard-${{ matrix.shard_index }}-${{ hashFiles('go.sum') }}

      - name: Run tests
        shell: bash
        run: |
          mapfile -t all_packages < <(go list ./...)
          selected=()
          for i in "${!all_packages[@]}"; do
            if (( i % ${{ matrix.shard_total }} == ${{ matrix.shard_index }} )); then
              selected+=("${all_packages[$i]}")
            fi
          done
          echo "Running shard ${{ matrix.shard_index }} with ${#selected[@]} packages"
          go test -v -race -coverprofile="coverage-${{ matrix.shard_index }}.out" "${selected[@]}"

      - name: Upload coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ./coverage-${{ matrix.shard_index }}.out
          flags: shard-${{ matrix.shard_index }}
          fail_ci_if_error: false

      - name: Save Go module cache
        if: matrix.shard_index == 0 && steps.go-mod-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Save Go build cache (shard)
        if: steps.go-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-shard-${{ matrix.shard_index }}-${{ hashFiles('go.sum') }}

  test:
    name: test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [test-shards]
    if: ${{ always() }}
    steps:
      - name: Ensure all test shards passed
        run: |
          if [ "${{ needs.test-shards.result }}" != "success" ]; then
            echo "One or more test shards failed."
            exit 1
          fi

  coverage-threshold:
    name: coverage-threshold
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [test-shards]
    if: ${{ always() }}
    steps:
      - name: Ensure all test shards passed
        run: |
          if [ "${{ needs.test-shards.result }}" != "success" ]; then
            echo "Skipping coverage threshold check because one or more shards failed."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Enforce minimum coverage
        shell: bash
        env:
          MIN_COVERAGE: "41.0"
        run: |
          set -euo pipefail
          mapfile -t all_packages < <(go list ./...)
          selected=()
          for pkg in "${all_packages[@]}"; do
            pkg_tests="$(go test -run '^$' -list . "$pkg" 2>/dev/null || true)"
            if printf '%s\n' "$pkg_tests" | grep -q '^Test'; then
              selected+=("$pkg")
            fi
          done
          if [ ${#selected[@]} -eq 0 ]; then
            echo "No packages with tests found."
            exit 1
          fi
          go test -coverprofile=coverage.out "${selected[@]}" | tee coverage-summary.txt
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Total coverage: ${total}%"
          awk -v total="$total" -v min="$MIN_COVERAGE" 'BEGIN { exit ((total + 0) < (min + 0)) }'
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path

          required = {
              "github.com/evalops/cerebro/internal/api": 40.0,
              "github.com/evalops/cerebro/internal/app": 47.0,
              "github.com/evalops/cerebro/internal/cache": 82.0,
              "github.com/evalops/cerebro/internal/graph": 62.0,
              "github.com/evalops/cerebro/internal/jobs": 24.5,
              "github.com/evalops/cerebro/internal/policy": 72.0,
              "github.com/evalops/cerebro/internal/providers": 51.0,
              "github.com/evalops/cerebro/internal/scanner": 44.0,
              "github.com/evalops/cerebro/internal/scheduler": 71.5,
              "github.com/evalops/cerebro/internal/sync": 11.5,
          }

          pattern = re.compile(r"^ok\s+(\S+)\s+.*coverage:\s+([0-9.]+)% of statements$")
          observed = {}
          for line in Path("coverage-summary.txt").read_text().splitlines():
              m = pattern.match(line.strip())
              if not m:
                  continue
              observed[m.group(1)] = float(m.group(2))

          failures = []
          for pkg, minimum in required.items():
              value = observed.get(pkg)
              if value is None:
                  failures.append(f"{pkg}: missing coverage output")
                  continue
              if value < minimum:
                  failures.append(f"{pkg}: {value:.1f}% < {minimum:.1f}%")

          if failures:
              print("Package coverage threshold failures:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print("Package-level coverage thresholds passed.")
          PY

  vendor-check:
    name: vendor-check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Verify vendor directory is in sync
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          go mod vendor
          git diff --exit-code -- go.mod go.sum vendor/modules.txt vendor

  openapi-route-parity:
    name: openapi-route-parity
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Verify OpenAPI matches registered routes
        run: go run ./scripts/openapi_route_parity.go

      - name: Lint OpenAPI contract
        run: npx --yes @stoplight/spectral-cli@6 lint --ruleset .spectral.yaml api/openapi.yaml

      - name: Ensure generated OpenAPI placeholders are removed
        shell: bash
        run: |
          set -euo pipefail
          if grep -n "x-cerebro-generated" api/openapi.yaml; then
            echo "OpenAPI still contains generated placeholders. Replace with real operation docs."
            exit 1
          fi
          if grep -n "Undocumented" api/openapi.yaml; then
            echo "OpenAPI still contains undocumented placeholder tags."
            exit 1
          fi

  graph-ontology-guardrails:
    name: graph-ontology-guardrails
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Enforce mapper ontology guardrails by source domain
        run: |
          go test ./internal/graphingest -run 'TestMapperContractFixtures|TestMapperSourceDomainCoverageGuardrails' -count=1

  ingest-replay-dry-run:
    name: ingest-replay-dry-run
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Run dead-letter replay dry-run and emit summary
        shell: bash
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          mapping="${tmpdir}/mappings.yaml"
          dlq="${tmpdir}/mapper.dlq.jsonl"

          cat > "${mapping}" <<'YAML'
          mappings:
            - name: replay_test
              source: replay.test
              nodes:
                - id: person:{{data.email}}
                  kind: person
                  name: "{{data.email}}"
                  provider: replay
          YAML

          cat > "${dlq}" <<'JSONL'
          {"recorded_at":"2026-03-09T23:00:00Z","event_id":"evt-ci-replay-1","event_type":"replay.test","event_source":"urn:test","event_time":"2026-03-09T23:00:00Z","event_data":{"email":"alice@example.com"},"mapping_name":"replay_test","entity_type":"node","entity_id":"person:alice@example.com","issues":[{"code":"unknown_node_kind","message":"fixture"}]}
          JSONL

          go run ./cmd/cerebro ingest replay-dead-letter \
            --path "${dlq}" \
            --mapping-path "${mapping}" \
            --limit 10 \
            --output json | tee "${tmpdir}/replay-summary.json"

          grep -q '"events_replayed"' "${tmpdir}/replay-summary.json"

  config-docs-drift:
    name: config-docs-drift
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Regenerate config docs
        run: go run ./scripts/generate_config_docs/main.go

      - name: Verify generated config docs are committed
        run: git diff --exit-code -- docs/CONFIG_ENV_VARS.md

  ontology-docs-drift:
    name: ontology-docs-drift
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Regenerate graph ontology catalog
        run: go run ./scripts/generate_graph_ontology_docs/main.go

      - name: Verify generated graph ontology docs are committed
        run: git diff --exit-code -- docs/GRAPH_ONTOLOGY_AUTOGEN.md

  cloudevents-docs-drift:
    name: cloudevents-docs-drift
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Regenerate CloudEvents catalog
        run: go run ./scripts/generate_cloudevents_docs/main.go

      - name: Verify generated CloudEvents docs are committed
        run: git diff --exit-code -- docs/CLOUDEVENTS_AUTOGEN.md docs/CLOUDEVENTS_CONTRACTS.json

  cloudevents-contract-compat:
    name: cloudevents-contract-compat
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Enforce mapping contract compatibility
        run: go run ./scripts/check_cloudevents_contract_compat/main.go --require-baseline

  api-auth-smoke:
    name: api-auth-smoke
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o cerebro ./cmd/cerebro

      - name: API auth end-to-end smoke
        shell: bash
        env:
          LOG_LEVEL: error
          API_PORT: "18080"
          API_AUTH_ENABLED: "true"
          API_KEYS: "smoke-key:smoke-admin"
          RBAC_STATE_FILE: "/tmp/cerebro-rbac-smoke.json"
        run: |
          set -euo pipefail
          cat > "$RBAC_STATE_FILE" <<'JSON'
          {
            "users": {
              "smoke-admin": {
                "id": "smoke-admin",
                "email": "smoke-admin@example.com",
                "name": "Smoke Admin",
                "role_ids": ["admin"]
              }
            }
          }
          JSON

          ./cerebro serve > /tmp/cerebro-api-auth-smoke.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" >/dev/null 2>&1 || true
            wait "$server_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:${API_PORT}/health" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:${API_PORT}/health" >/dev/null

          unauth_status=$(curl -sS -o /tmp/api-auth-smoke-unauth.json -w "%{http_code}" \
            "http://127.0.0.1:${API_PORT}/api/v1/policies/")
          if [ "$unauth_status" != "401" ]; then
            echo "expected 401 for unauthenticated request, got $unauth_status"
            cat /tmp/cerebro-api-auth-smoke.log || true
            exit 1
          fi

          auth_status=$(curl -sS -H "Authorization: Bearer smoke-key" -o /tmp/api-auth-smoke-auth.json -w "%{http_code}" \
            "http://127.0.0.1:${API_PORT}/api/v1/policies/")
          if [ "$auth_status" -ne "200" ]; then
            echo "expected 200 for authenticated request, got $auth_status"
            cat /tmp/cerebro-api-auth-smoke.log || true
            exit 1
          fi

          xkey_status=$(curl -sS -H "X-API-Key: smoke-key" -o /tmp/api-auth-smoke-xkey.json -w "%{http_code}" \
            "http://127.0.0.1:${API_PORT}/api/v1/policies/")
          if [ "$xkey_status" -ne "200" ]; then
            echo "expected 200 for X-API-Key request, got $xkey_status"
            cat /tmp/cerebro-api-auth-smoke.log || true
            exit 1
          fi

          malformed_auth_status=$(curl -sS \
            -H "Authorization: Token malformed" \
            -H "X-API-Key: smoke-key" \
            -o /tmp/api-auth-smoke-malformed-auth.json \
            -w "%{http_code}" \
            "http://127.0.0.1:${API_PORT}/api/v1/policies/")
          if [ "$malformed_auth_status" != "401" ]; then
            echo "expected 401 for malformed Authorization header, got $malformed_auth_status"
            cat /tmp/cerebro-api-auth-smoke.log || true
            exit 1
          fi

          conflicting_headers_status=$(curl -sS \
            -H "Authorization: Bearer smoke-key" \
            -H "X-API-Key: not-smoke-key" \
            -o /tmp/api-auth-smoke-conflicting-headers.json \
            -w "%{http_code}" \
            "http://127.0.0.1:${API_PORT}/api/v1/policies/")
          if [ "$conflicting_headers_status" != "401" ]; then
            echo "expected 401 for conflicting auth headers, got $conflicting_headers_status"
            cat /tmp/cerebro-api-auth-smoke.log || true
            exit 1
          fi
          for public_path in /metrics /docs /openapi.yaml; do
            public_status=$(curl -sS -o "/tmp/api-auth-smoke-public-$(echo "$public_path" | tr '/.' '__').json" -w "%{http_code}" \
              "http://127.0.0.1:${API_PORT}${public_path}")
            if [ "$public_status" -ne "200" ]; then
              echo "expected 200 for public endpoint ${public_path}, got $public_status"
              cat /tmp/cerebro-api-auth-smoke.log || true
              exit 1
            fi
          done
  api-auth-rbac-smoke:
    name: api-auth-rbac-smoke
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o cerebro ./cmd/cerebro

      - name: RBAC role matrix smoke
        shell: bash
        env:
          LOG_LEVEL: error
          API_PORT: "18081"
          API_AUTH_ENABLED: "true"
          API_KEYS: "viewer-key:viewer-1,analyst-key:analyst-1,admin-key:admin-1"
          RBAC_STATE_FILE: "/tmp/cerebro-rbac-role-smoke.json"
        run: |
          set -euo pipefail
          cat > "$RBAC_STATE_FILE" <<'JSON'
          {
            "users": {
              "viewer-1": {
                "id": "viewer-1",
                "email": "viewer@example.com",
                "name": "Viewer",
                "role_ids": ["viewer"]
              },
              "analyst-1": {
                "id": "analyst-1",
                "email": "analyst@example.com",
                "name": "Analyst",
                "role_ids": ["analyst"]
              },
              "admin-1": {
                "id": "admin-1",
                "email": "admin@example.com",
                "name": "Admin",
                "role_ids": ["admin"]
              }
            }
          }
          JSON

          ./cerebro serve > /tmp/cerebro-api-auth-rbac-smoke.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" >/dev/null 2>&1 || true
            wait "$server_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:${API_PORT}/health" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:${API_PORT}/health" >/dev/null

          endpoint="http://127.0.0.1:${API_PORT}/api/v1/agents/sessions"
          payload='{"agent_id":"missing-agent"}'

          viewer_status=$(curl -sS -H "Authorization: Bearer viewer-key" -H "Content-Type: application/json" \
            -d "$payload" -o /tmp/api-auth-rbac-viewer.json -w "%{http_code}" "$endpoint")
          analyst_status=$(curl -sS -H "Authorization: Bearer analyst-key" -H "Content-Type: application/json" \
            -d "$payload" -o /tmp/api-auth-rbac-analyst.json -w "%{http_code}" "$endpoint")
          admin_status=$(curl -sS -H "Authorization: Bearer admin-key" -H "Content-Type: application/json" \
            -d "$payload" -o /tmp/api-auth-rbac-admin.json -w "%{http_code}" "$endpoint")

          if [ "$viewer_status" != "403" ]; then
            echo "expected viewer to receive 403, got $viewer_status"
            cat /tmp/cerebro-api-auth-rbac-smoke.log || true
            exit 1
          fi
          if [ "$analyst_status" = "403" ]; then
            echo "expected analyst to pass RBAC (non-403), got $analyst_status"
            cat /tmp/cerebro-api-auth-rbac-smoke.log || true
            exit 1
          fi
          if [ "$admin_status" = "403" ]; then
            echo "expected admin to pass RBAC (non-403), got $admin_status"
            cat /tmp/cerebro-api-auth-rbac-smoke.log || true
            exit 1
          fi

  scan-smoke-local:
    name: scan-smoke-local
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o cerebro ./cmd/cerebro

      - name: Scan preflight (local dataset)
        env:
          LOG_LEVEL: error
        run: ./cerebro scan --preflight --local-fixture internal/cli/testdata/scan_smoke_fixture.json --output json

      - name: Local scan smoke
        shell: bash
        env:
          LOG_LEVEL: error
        run: |
          set -euo pipefail
          ./cerebro scan --local-fixture internal/cli/testdata/scan_smoke_fixture.json --output json --graph=false --toxic-combos=false > /tmp/scan-output.txt
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          raw = Path('/tmp/scan-output.txt').read_text()

          # Try full output as JSON first (clean case).
          try:
              payload = json.loads(raw)
          except json.JSONDecodeError:
              # Output has non-JSON preamble (log lines). Find the first '{' that
              # starts the JSON object and parse from there.
              payload = None
              idx = raw.find('{')
              if idx >= 0:
                  try:
                      payload = json.loads(raw[idx:])
                  except json.JSONDecodeError:
                      pass
              if payload is None:
                  print('ERROR: no valid JSON found in scan output', file=sys.stderr)
                  print('--- first 2000 chars ---', file=sys.stderr)
                  print(raw[:2000], file=sys.stderr)
                  sys.exit(1)

          if payload.get('scanned', 0) <= 0:
              raise SystemExit('expected scanned > 0 in local smoke scan')
          PY

  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.1
          args: --timeout=15m ./cmd/... ./internal/... ./api/...

  gosec-shards:
    name: gosec shard ${{ matrix.shard_index }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3]
        shard_total: [4]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.24.7

      - name: Run gosec shard
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t all_packages < <(go list -f '{{.Dir}}' ./...)
          selected=()
          for i in "${!all_packages[@]}"; do
            if (( i % ${{ matrix.shard_total }} == ${{ matrix.shard_index }} )); then
              selected+=("${all_packages[$i]}")
            fi
          done
          echo "Running gosec shard ${{ matrix.shard_index }} with ${#selected[@]} packages"
          if [ ${#selected[@]} -eq 0 ]; then
            exit 0
          fi
          for pkg in "${selected[@]}"; do
            echo "Scanning ${pkg}"
            $(go env GOPATH)/bin/gosec -quiet -severity medium -confidence medium -exclude-generated "${pkg}"
          done

  gosec:
    name: gosec
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [gosec-shards]
    if: ${{ always() }}
    steps:
      - name: Ensure all gosec shards passed
        run: |
          if [ "${{ needs.gosec-shards.result }}" != "success" ]; then
            echo "One or more gosec shards failed."
            exit 1
          fi

  govulncheck:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Build binaries
        run: |
          go build -o /tmp/cerebro ./cmd/cerebro
          go build -o /tmp/policy-enhancer ./cmd/policy-enhancer

      - name: Run govulncheck
        timeout-minutes: 10
        run: |
          $(go env GOPATH)/bin/govulncheck -mode binary /tmp/cerebro
          $(go env GOPATH)/bin/govulncheck -mode binary /tmp/policy-enhancer

  trivy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build image for scanning
        shell: bash
        run: |
          set -euo pipefail
          GO_VERSION="$(./scripts/go_version.sh)"
          docker build --build-arg GO_VERSION="${GO_VERSION}" -f Dockerfile -t cerebro:ci .

      - name: Run Trivy image scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${HOME}/.cache/trivy:/root/.cache/trivy" \
            aquasec/trivy:0.69.1 image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            cerebro:ci

  policy-validate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o cerebro ./cmd/cerebro

      - name: Validate policies
        run: ./cerebro policy validate

  runtime-image-build:
    name: runtime-image-build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ef12d5b165b596e3aa44ea8198d8fde563eab402 # v1

      - name: Build and validate amd64 runtime image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -buildvcs=false -trimpath -ldflags="-s -w" -o .dist/cerebro ./cmd/cerebro
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.runtime \
            -t cerebro:runtime-ci-amd64 \
            --load .

      - name: Build and validate arm64 runtime image
        shell: bash
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -buildvcs=false -trimpath -ldflags="-s -w" -o .dist/cerebro ./cmd/cerebro
          docker buildx build --platform linux/arm64 \
            -f Dockerfile.runtime \
            -t cerebro:runtime-ci-arm64 \
            --load .
