name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-shards:
    name: Test shard ${{ matrix.shard_index }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1]
        shard_total: [2]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go module cache
        id: go-mod-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Restore Go build cache (shard)
        id: go-build-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-shard-${{ matrix.shard_index }}-${{ hashFiles('go.sum') }}

      - name: Run tests
        shell: bash
        run: |
          mapfile -t all_packages < <(go list ./...)
          selected=()
          for i in "${!all_packages[@]}"; do
            if (( i % ${{ matrix.shard_total }} == ${{ matrix.shard_index }} )); then
              selected+=("${all_packages[$i]}")
            fi
          done
          echo "Running shard ${{ matrix.shard_index }} with ${#selected[@]} packages"
          go test -v -race -coverprofile="coverage-${{ matrix.shard_index }}.out" "${selected[@]}"

      - name: Upload coverage
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          files: ./coverage-${{ matrix.shard_index }}.out
          flags: shard-${{ matrix.shard_index }}
          fail_ci_if_error: false

      - name: Save Go module cache
        if: matrix.shard_index == 0 && steps.go-mod-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Save Go build cache (shard)
        if: steps.go-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-shard-${{ matrix.shard_index }}-${{ hashFiles('go.sum') }}

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [test-shards]
    if: ${{ always() }}
    steps:
      - name: Ensure all test shards passed
        run: |
          if [ "${{ needs.test-shards.result }}" != "success" ]; then
            echo "One or more test shards failed."
            exit 1
          fi

  coverage-threshold:
    name: coverage-threshold
    runs-on: ubuntu-latest
    needs: [test-shards]
    if: ${{ always() }}
    steps:
      - name: Ensure all test shards passed
        run: |
          if [ "${{ needs.test-shards.result }}" != "success" ]; then
            echo "Skipping coverage threshold check because one or more shards failed."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Enforce minimum coverage
        shell: bash
        env:
          MIN_COVERAGE: "41.0"
        run: |
          set -euo pipefail
          mapfile -t all_packages < <(go list ./...)
          selected=()
          for pkg in "${all_packages[@]}"; do
            pkg_tests="$(go test -run '^$' -list . "$pkg" 2>/dev/null || true)"
            if printf '%s\n' "$pkg_tests" | grep -q '^Test'; then
              selected+=("$pkg")
            fi
          done
          if [ ${#selected[@]} -eq 0 ]; then
            echo "No packages with tests found."
            exit 1
          fi
          go test -coverprofile=coverage.out "${selected[@]}" | tee coverage-summary.txt
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Total coverage: ${total}%"
          awk -v total="$total" -v min="$MIN_COVERAGE" 'BEGIN { exit ((total + 0) < (min + 0)) }'
          python3 - <<'PY'
          import re
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          required = {
              "github.com/writer/cerebro/internal/api": 55.0,
              "github.com/writer/cerebro/internal/app": 47.0,
              "github.com/writer/cerebro/internal/cache": 82.0,
              "github.com/writer/cerebro/internal/graph": 62.0,
              "github.com/writer/cerebro/internal/jobs": 24.5,
              "github.com/writer/cerebro/internal/policy": 72.0,
              "github.com/writer/cerebro/internal/providers": 51.0,
              "github.com/writer/cerebro/internal/scanner": 44.0,
              "github.com/writer/cerebro/internal/scheduler": 71.5,
              "github.com/writer/cerebro/internal/sync": 20.0,
          }

          pattern = re.compile(r"^ok\s+(\S+)\s+.*coverage:\s+([0-9.]+)% of statements$")
          observed = {}
          for line in Path("coverage-summary.txt").read_text().splitlines():
              m = pattern.match(line.strip())
              if not m:
                  continue
              observed[m.group(1)] = float(m.group(2))

          total_pattern = re.compile(r"^total:\s+\(statements\)\s+([0-9.]+)%$")

          def fallback_package_coverage(pkg: str) -> float:
              with tempfile.NamedTemporaryFile(suffix=".out") as profile:
                  subprocess.run(
                      ["go", "test", f"-coverprofile={profile.name}", pkg],
                      check=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                      text=True,
                  )
                  result = subprocess.run(
                      ["go", "tool", "cover", f"-func={profile.name}"],
                      check=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                      text=True,
                  )
              for line in result.stdout.splitlines():
                  m = total_pattern.match(line.strip())
                  if m:
                      return float(m.group(1))
              raise RuntimeError("fallback coverage probe produced no total coverage line")

          failures = []
          for pkg, minimum in required.items():
              value = observed.get(pkg)
              if value is None:
                  try:
                      value = fallback_package_coverage(pkg)
                      observed[pkg] = value
                  except Exception as exc:  # pragma: no cover - exercised in CI
                      failures.append(f"{pkg}: missing coverage output ({exc})")
                      continue
              if value < minimum:
                  failures.append(f"{pkg}: {value:.1f}% < {minimum:.1f}%")

          if failures:
              print("Package coverage threshold failures:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print("Package-level coverage thresholds passed.")
          PY

  go-version-docs:
    name: go-version-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure README Go version matches go.mod
        shell: bash
        run: |
          set -euo pipefail
          GO_VERSION="$(awk '/^go [0-9]/{print $2; exit}' go.mod)"
          GO_MINOR="$(printf '%s' "${GO_VERSION}" | cut -d. -f1,2)"
          grep -q "Go-${GO_MINOR}+-" README.md
          grep -q "Go ${GO_MINOR}+" README.md

  vendor-check:
    name: vendor-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Verify Go module metadata is in sync
        shell: bash
        run: |
          set -euo pipefail
          make vendor-check

  openapi-route-parity:
    name: openapi-route-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Verify OpenAPI matches registered routes
        run: go run ./scripts/openapi_route_parity.go

      - name: Lint OpenAPI contract
        run: npx --yes @stoplight/spectral-cli@6 lint --ruleset .spectral.yaml api/openapi.yaml

      - name: Ensure generated OpenAPI placeholders are removed
        shell: bash
        run: |
          set -euo pipefail
          if grep -n "x-cerebro-generated" api/openapi.yaml; then
            echo "OpenAPI still contains generated placeholders. Replace with real operation docs."
            exit 1
          fi
          if grep -n "Undocumented" api/openapi.yaml; then
            echo "OpenAPI still contains undocumented placeholder tags."
            exit 1
          fi

  graph-ontology-guardrails:
    name: graph-ontology-guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Enforce mapper ontology guardrails by source domain
        run: |
          go test ./internal/graphingest -run 'TestMapperContractFixtures|TestMapperSourceDomainCoverageGuardrails' -count=1

  ingest-replay-dry-run:
    name: ingest-replay-dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Run dead-letter replay dry-run and emit summary
        shell: bash
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          mapping="${tmpdir}/mappings.yaml"
          dlq="${tmpdir}/mapper.dlq.jsonl"

          cat > "${mapping}" <<'YAML'
          mappings:
            - name: replay_test
              source: replay.test
              nodes:
                - id: person:{{data.email}}
                  kind: person
                  name: "{{data.email}}"
                  provider: replay
          YAML

          cat > "${dlq}" <<'JSONL'
          {"recorded_at":"2026-03-09T23:00:00Z","event_id":"evt-ci-replay-1","event_type":"replay.test","event_source":"urn:test","event_time":"2026-03-09T23:00:00Z","event_data":{"email":"alice@example.com"},"mapping_name":"replay_test","entity_type":"node","entity_id":"person:alice@example.com","issues":[{"code":"unknown_node_kind","message":"fixture"}]}
          JSONL

          go run ./cmd/cerebro ingest replay-dead-letter \
            --path "${dlq}" \
            --mapping-path "${mapping}" \
            --limit 10 \
            --output json | tee "${tmpdir}/replay-summary.json"

          grep -q '"events_replayed"' "${tmpdir}/replay-summary.json"

