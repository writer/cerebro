name: Droid Tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, edited]

jobs:
  droid:
    if: |
      (github.event_name == 'issue_comment' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        contains(github.event.comment.body || '', '@droid')) ||
      (github.event_name == 'pull_request_review_comment' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        contains(github.event.comment.body || '', '@droid')) ||
      (github.event_name == 'pull_request_review' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association) &&
        contains(github.event.review.body || '', '@droid')) ||
      (github.event_name == 'issues' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) &&
        (contains(github.event.issue.body || '', '@droid') || contains(github.event.issue.title || '', '@droid'))) ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) &&
        (contains(github.event.pull_request.body || '', '@droid') || contains(github.event.pull_request.title || '', '@droid')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1
      - name: Run Droid Exec
        uses: Factory-AI/droid-action@8ea31f351ee6636ebef918ccb64682f477af7184 # main
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          # Pin tag-triggered review/security runs (@droid review / @droid security) to the
          # gpt-5.4 generation with high reasoning effort. The action's default
          # `review_depth: deep` resolves to gpt-5.2, and setting `review_model` explicitly
          # bypasses the depth preset, so we also re-assert reasoning_effort=high.
          review_model: gpt-5.4
          security_model: gpt-5.4
          reasoning_effort: high
