version: "2"

run:
  timeout: 15m
  tests: true

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - bodyclose
    - noctx
    - errorlint
    - misspell
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - noctx

formatters:
  enable:
    - goimports
