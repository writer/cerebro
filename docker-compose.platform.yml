version: "3.9"

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ensemble
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  ensemble-tap:
    build: ../ensemble-tap
    environment:
      TAP_NATS_URL: nats://nats:4222
      TAP_CLICKHOUSE_ADDR: clickhouse:9000
    ports:
      - "8081:8080"
    depends_on:
      - nats
      - clickhouse

  cerebro:
    build: .
    environment:
      API_PORT: "8080"
      LOG_LEVEL: info
      JETSTREAM_URLS: nats://nats:4222
      NATS_CONSUMER_ENABLED: "true"
      CEDAR_POLICIES_PATH: /app/policies
    ports:
      - "8080:8080"
    volumes:
      - ./policies:/app/policies:ro
    depends_on:
      - nats

  ensemble:
    build: ../ensemble
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ensemble?sslmode=disable
      REDIS_URL: redis://redis:6379
    ports:
      - "3999:3999"
    depends_on:
      - nats
      - postgres
      - redis

volumes:
  nats-data:
  clickhouse-data:
  postgres-data:
  redis-data:
