version: 2

project_name: cerebro

before:
  hooks:
    - go mod tidy

builds:
  - id: cerebro
    main: ./cmd/cerebro
    binary: cerebro
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/evalops/cerebro/internal/cli.Version={{.Version}} -X github.com/evalops/cerebro/internal/cli.Commit={{.Commit}} -X github.com/evalops/cerebro/internal/cli.BuildDate={{.Date}}

  - id: policy-enhancer
    main: ./cmd/policy-enhancer
    binary: policy-enhancer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: binaries
    builds:
      - cerebro
      - policy-enhancer
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  sort: asc
