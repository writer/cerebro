                $ref: '#/components/schemas/Error'
        '503':
          description: Graph platform is not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/org/meeting-insights:
    get:
      tags:
        - Org
      summary: Analyze meeting quality and optimization opportunities
      description: Return missing participants, unnecessary attendees, redundant meeting pairs, fragile bridges, and aggregate meeting optimization metrics.
      parameters:
        - name: team
          in: query
          required: false
          description: Optional team/department filter (for example engineering).
          schema:
            type: string
      responses:
        '200':
          description: Meeting optimization insight report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingInsightsReport'
        '503':
          description: Graph platform is not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/org/meetings/{id}/analysis:
    get:
      tags:
