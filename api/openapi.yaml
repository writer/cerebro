          description: Comma-separated node categories to include.
          schema:
            type: string
        - name: capability
          in: query
          description: Comma-separated node capabilities to require.
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
        - name: account
          in: query
          schema:
            type: string
        - name: region
          in: query
          schema:
            type: string
        - name: risk
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low, none]
