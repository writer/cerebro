          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/policies/{id}/versions:
    get:
      parameters:
        - name: id
          in: path
          required: true
          description: Policy identifier
          schema:
            type: string
      tags:
        - Policies
      summary: List policy version history
      description: Return persisted policy versions for a policy ID in descending version order.
      responses:
        '200':
          description: Policy version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                  versions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  count:
                    type: integer
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        maximum: 1000
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
    ReadyResponse:
      type: object
      properties:
        ready:
          type: boolean
        checks:
          type: object
          additionalProperties:
            type: string
    TablesResponse:
      type: object
      properties:
        tables:
          type: array
          items:
            type: string
        count:
          type: integer
    QueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          example: SELECT * FROM aws_s3_buckets LIMIT 10
        limit:
          type: integer
    QueryResponse:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: object
        count:
          type: integer
    AssetsResponse:
      type: object
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        count:
          type: integer
        pagination:
          $ref: '#/components/schemas/Pagination'
    Asset:
      type: object
      additionalProperties: true
    Policy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        effect:
          type: string
          enum:
            - permit
            - forbid
        resource:
          type: string
        conditions:
          type: array
          items:
            type: string
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
        tags:
          type: array
          items:
            type: string
    PoliciesResponse:
      type: object
      properties:
        policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        count:
          type: integer
    EvaluateRequest:
      type: object
      properties:
        principal:
          type: object
          additionalProperties: true
        action:
          type: string
        resource:
          type: object
          additionalProperties: true
        context:
          type: object
          additionalProperties: true
        proposed_change:
          type: object
          additionalProperties: true
      required:
        - action
    EvaluateResponse:
      type: object
      properties:
        decision:
          type: string
          enum:
            - allow
            - deny
            - require_approval
        requires_approval:
          type: boolean
        matched:
          type: array
          items:
            type: string
        reasons:
          type: array
          items:
            type: string
        remediation_steps:
          type: array
          items:
            type: string
        policy_evaluation:
          type: object
          additionalProperties: true
        propagation:
          type: object
          additionalProperties: true
    Finding:
      type: object
      properties:
        id:
          type: string
        policy_id:
          type: string
        policy_name:
          type: string
        severity:
          type: string
        status:
          type: string
        resource:
          type: object
        description:
          type: string
        remediation:
          type: string
        created_at:
          type: string
          format: date-time
    FindingsResponse:
      type: object
      properties:
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
        count:
          type: integer
        pagination:
          $ref: '#/components/schemas/Pagination'
    FindingsStats:
      type: object
      properties:
        total:
          type: integer
        by_severity:
          type: object
          additionalProperties:
            type: integer
        by_status:
          type: object
          additionalProperties:
            type: integer
        by_policy:
          type: object
          additionalProperties:
            type: integer
    ScanResponse:
      type: object
      required:
        - scanned
        - violations
        - duration
        - findings
        - tables
      properties:
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
        scanned:
          type: integer
        violations:
          type: integer
        duration:
          type: string
        tables:
          type: array
          items:
            $ref: '#/components/schemas/ScanTableResult'
    ScanTableResult:
      type: object
      required:
        - table
        - scanned
        - violations
        - duration
      properties:
        table:
          type: string
        scanned:
          type: integer
        violations:
          type: integer
        duration:
          type: string
    Framework:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        controls:
          type: array
          items:
            $ref: '#/components/schemas/Control'
    Control:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        policy_ids:
          type: array
          items:
            type: string
    FrameworksResponse:
      type: object
      properties:
        frameworks:
          type: array
          items:
            $ref: '#/components/schemas/Framework'
        count:
          type: integer
    ComplianceReport:
      type: object
      properties:
        framework_id:
          type: string
        framework_name:
          type: string
        generated_at:
          type: string
          format: date-time
        summary:
          $ref: '#/components/schemas/ComplianceSummary'
        controls:
          type: array
          items:
            $ref: '#/components/schemas/ControlStatus'
    ComplianceSummary:
      type: object
      properties:
        total_controls:
          type: integer
        passing_controls:
          type: integer
        failing_controls:
          type: integer
        compliance_score:
          type: number
    ControlStatus:
      type: object
      properties:
        control_id:
          type: string
        status:
          type: string
          enum:
            - passing
            - failing
            - unknown
    PreAuditReport:
      type: object
      properties:
        framework_id:
          type: string
        estimated_outcome:
          type: string
        summary:
          type: object
        controls:
          type: array
          items:
            type: object
        recommendations:
          type: array
          items:
            type: string
    AuditPackage:
      type: object
      properties:
        manifest:
          type: object
        controls:
          type: array
          items:
            type: object
    StaleAccessResponse:
      type: object
      properties:
        findings:
          type: array
          items:
            $ref: '#/components/schemas/StaleAccessFinding'
        count:
          type: integer
        summary:
          type: object
    StaleAccessFinding:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        severity:
          type: string
        principal:
          type: object
        provider:
          type: string
        last_activity:
          type: string
          format: date-time
        days_since:
          type: integer
        details:
          type: string
        remediation:
          type: string
    IdentityReport:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        summary:
          type: object
        by_provider:
          type: object
        stale_access:
          type: object
        privileged_users:
          type: array
          items:
            type: object
        recommendations:
          type: array
          items:
