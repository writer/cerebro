openapi: 3.1.0
info:
  title: Cerebro Bootstrap API
  version: v1
  description: Current Writer/Cerebro bootstrap HTTP API. The Connect RPC contract is defined in proto/cerebro/v1/bootstrap.proto.
servers:
  - url: http://127.0.0.1:8080
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Service health and dependency status.
  /healthz:
    get:
      summary: Health check alias
      security: []
      responses:
        '200':
          description: Service health and dependency status.
  /openapi.yaml:
    get:
      summary: Current OpenAPI contract
      security: []
      responses:
        '200':
          description: Embedded OpenAPI YAML.
  /sources:
    get:
      summary: List registered sources
      responses:
        '200':
          description: Source catalog.
  /sources/{sourceID}/check:
    get:
      summary: Check source configuration
      parameters:
        - $ref: '#/components/parameters/sourceID'
      responses:
        '200':
          description: Source check result.
  /sources/{sourceID}/discover:
    get:
      summary: Discover source URNs
      parameters:
        - $ref: '#/components/parameters/sourceID'
      responses:
        '200':
          description: Discovery result.
  /sources/{sourceID}/read:
    get:
      summary: Read one source preview page
      parameters:
        - $ref: '#/components/parameters/sourceID'
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Source events and cursor.
  /source-runtimes/{runtimeID}:
    put:
      summary: Store source runtime configuration
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutSourceRuntimeRequest'
      responses:
        '200':
          description: Stored source runtime.
    get:
      summary: Get source runtime configuration
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      responses:
        '200':
          description: Stored source runtime.
  /source-runtimes/{runtimeID}/sync:
    post:
      summary: Sync one source runtime through the append log and projections
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      responses:
        '200':
          description: Sync result.
  /source-runtimes/{runtimeID}/graph-ingest-runs:
    post:
      summary: Run graph ingest for one source runtime
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      responses:
        '200':
          description: Graph ingest run.
  /source-runtimes/{runtimeID}/claims:
    get:
      summary: List claims for one runtime
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      responses:
        '200':
          description: Claim list.
    post:
      summary: Write claims for one runtime
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      responses:
        '200':
          description: Claim write result.
  /source-runtimes/{runtimeID}/findings:
    get:
      summary: List findings for one runtime
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      responses:
        '200':
          description: Finding list.
  /source-runtimes/{runtimeID}/finding-rules/evaluate:
    post:
      summary: Evaluate selected finding rules for one runtime
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      responses:
        '200':
          description: Rule evaluation result.
  /source-runtimes/{runtimeID}/findings/evaluate:
    post:
      summary: Evaluate and persist findings for one runtime
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      responses:
        '200':
          description: Finding evaluation result.
  /source-runtimes/{runtimeID}/finding-evidence:
    get:
      summary: List finding evidence for one runtime
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      responses:
        '200':
          description: Finding evidence list.
  /source-runtimes/{runtimeID}/finding-evaluation-runs:
    get:
      summary: List finding evaluation runs for one runtime
      parameters:
        - $ref: '#/components/parameters/runtimeID'
      responses:
        '200':
          description: Finding evaluation run list.
  /findings/{findingID}:
    get:
      summary: Get finding
      parameters:
        - $ref: '#/components/parameters/findingID'
      responses:
        '200':
          description: Finding.
  /findings/{findingID}/resolve:
    post:
      summary: Resolve finding
      parameters:
        - $ref: '#/components/parameters/findingID'
      responses:
        '200':
          description: Updated finding.
  /findings/{findingID}/suppress:
    post:
      summary: Suppress finding
      parameters:
        - $ref: '#/components/parameters/findingID'
      responses:
        '200':
          description: Updated finding.
  /findings/{findingID}/notes:
    post:
      summary: Add finding note
      parameters:
        - $ref: '#/components/parameters/findingID'
      responses:
        '200':
          description: Updated finding.
  /findings/{findingID}/tickets:
    post:
      summary: Link finding ticket
      parameters:
        - $ref: '#/components/parameters/findingID'
      responses:
        '200':
          description: Updated finding.
  /findings/{findingID}/assign:
    put:
      summary: Assign finding
      parameters:
        - $ref: '#/components/parameters/findingID'
      responses:
        '200':
          description: Updated finding.
  /findings/{findingID}/due:
    put:
      summary: Set finding due date
      parameters:
        - $ref: '#/components/parameters/findingID'
      responses:
        '200':
          description: Updated finding.
  /finding-rules:
    get:
      summary: List finding rules
      responses:
        '200':
          description: Finding rule catalog.
  /finding-evaluation-runs/{runID}:
    get:
      summary: Get finding evaluation run
      parameters:
        - $ref: '#/components/parameters/runID'
      responses:
        '200':
          description: Finding evaluation run.
  /finding-evidence/{evidenceID}:
    get:
      summary: Get finding evidence
      parameters:
        - $ref: '#/components/parameters/evidenceID'
      responses:
        '200':
          description: Finding evidence.
  /reports:
    get:
      summary: List report definitions
      responses:
        '200':
          description: Report definition catalog.
  /reports/{reportID}/runs:
    post:
      summary: Run report
      parameters:
        - $ref: '#/components/parameters/reportID'
      responses:
        '200':
          description: Report run.
  /report-runs/{runID}:
    get:
      summary: Get report run
      parameters:
        - $ref: '#/components/parameters/runID'
      responses:
        '200':
          description: Report run.
  /platform/knowledge/decisions:
    post:
      summary: Record platform decision
      responses:
        '200':
          description: Decision write result.
  /platform/knowledge/actions:
    post:
      summary: Record platform action
      responses:
        '200':
          description: Action write result.
  /platform/knowledge/actions/recommendation:
    post:
      summary: Record recommended action
      responses:
        '200':
          description: Action write result.
  /platform/knowledge/outcomes:
    post:
      summary: Record platform outcome
      responses:
        '200':
          description: Outcome write result.
  /platform/workflow/replay:
    post:
      summary: Replay workflow events
      responses:
        '200':
          description: Replay result.
  /platform/graph/neighborhood:
    get:
      summary: Query graph neighborhood
      parameters:
        - name: root_urn
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Neighborhood result.
  /platform/graph/impact/vulnerability/{id}:
    get:
      summary: Query vulnerability impact graph
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: depth
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Vulnerability impact result.
  /platform/graph/impact/package:
    get:
      summary: Query package exposure graph
      parameters:
        - name: package
          in: query
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: depth
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Package exposure result.
  /platform/graph/impact/asset:
    get:
      summary: Query asset vulnerability graph
      parameters:
        - name: urn
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: depth
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Asset vulnerability result.
  /platform/graph/ingest-health:
    get:
      summary: Check graph ingest health
      responses:
        '200':
          description: Graph ingest health.
  /platform/graph/ingest-runs:
    get:
      summary: List graph ingest runs
      responses:
        '200':
          description: Graph ingest runs.
  /platform/graph/ingest-runs/{runID}:
    get:
      summary: Get graph ingest run
      parameters:
        - $ref: '#/components/parameters/runID'
      responses:
        '200':
          description: Graph ingest run.
  /graph/neighborhood:
    get:
      deprecated: true
      summary: Legacy alias for /platform/graph/neighborhood
      responses:
        '200':
          description: Neighborhood result.
  /graph/impact/vulnerability/{id}:
    get:
      deprecated: true
      summary: Legacy alias for /platform/graph/impact/vulnerability/{id}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vulnerability impact result.
  /graph/impact/package:
    get:
      deprecated: true
      summary: Legacy alias for /platform/graph/impact/package
      responses:
        '200':
          description: Package exposure result.
  /graph/impact/asset:
    get:
      deprecated: true
      summary: Legacy alias for /platform/graph/impact/asset
      responses:
        '200':
          description: Asset vulnerability result.
  /graph/ingest-health:
    get:
      deprecated: true
      summary: Legacy alias for /platform/graph/ingest-health
      responses:
        '200':
          description: Graph ingest health.
  /graph/ingest-runs:
    get:
      deprecated: true
      summary: Legacy alias for /platform/graph/ingest-runs
      responses:
        '200':
          description: Graph ingest runs.
  /graph/ingest-runs/{runID}:
    get:
      deprecated: true
      summary: Legacy alias for /platform/graph/ingest-runs/{runID}
      parameters:
        - $ref: '#/components/parameters/runID'
      responses:
        '200':
          description: Graph ingest run.
  /graph/actuate/recommendation:
    post:
      deprecated: true
      summary: Legacy alias for /platform/knowledge/actions/recommendation
      responses:
        '200':
          description: Action write result.
  /graph/write/outcome:
    post:
      deprecated: true
      summary: Legacy alias for /platform/knowledge/outcomes
      responses:
        '200':
          description: Outcome write result.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    sourceID:
      name: sourceID
      in: path
      required: true
      schema:
        type: string
    runtimeID:
      name: runtimeID
      in: path
      required: true
      schema:
        type: string
    findingID:
      name: findingID
      in: path
      required: true
      schema:
        type: string
    runID:
      name: runID
      in: path
      required: true
      schema:
        type: string
    evidenceID:
      name: evidenceID
      in: path
      required: true
      schema:
        type: string
    reportID:
      name: reportID
      in: path
      required: true
      schema:
        type: string
  schemas:
    PutSourceRuntimeRequest:
      type: object
      required: [runtime]
      properties:
        runtime:
          type: object
          required: [id, sourceId, tenantId]
          properties:
            id:
              type: string
            sourceId:
              type: string
            tenantId:
              type: string
            config:
              type: object
              additionalProperties:
                type: string
