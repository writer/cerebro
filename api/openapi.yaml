          description: Meeting analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingAnalysis'
        '404':
          description: Meeting analysis not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Graph platform is not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/policies/{id}/dry-run:
    post:
      parameters:
        - name: id
          in: path
          required: true
          description: Policy identifier
          schema:
            type: string
      tags:
        - Policies
      summary: Dry-run a policy change
      description: Evaluate a candidate policy revision against request-supplied or fetched assets without persisting changes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Dry-run impact result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid dry-run request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to evaluate dry-run request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/policies/{id}/rollback:
    post:
      parameters:
        - name: id
          in: path
          required: true
          description: Policy identifier
          schema:
            type: string
      tags:
        - Policies
      summary: Roll back a policy version
      description: Restore the current policy definition to a specific historical version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - version
              properties:
                version:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Rolled-back policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          description: Invalid rollback request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Policy or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/policies/{id}/versions:
    get:
      parameters:
        - name: id
          in: path
          required: true
          description: Policy identifier
          schema:
            type: string
      tags:
        - Policies
      summary: List policy version history
      description: Return persisted policy versions for a policy ID in descending version order.
      responses:
        '200':
          description: Policy version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                  versions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  count:
                    type: integer
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/platform/intelligence/unified-execution-timeline:
    get:
      tags:
        - Platform
      summary: Build a unified execution timeline across evaluation and playbook workflows
      description: Return one chronological execution timeline across evaluation and playbook workflows, including communication, decisions, actions, outcomes, claims, and directly linked evidence.
      parameters:
        - name: window_days
          in: query
          required: false
          description: Timeline window in days to include in the report (1-365).
          schema:
            type: integer
            minimum: 1
            maximum: 365
        - name: max_events
          in: query
          required: false
          description: Maximum number of events to return in chronological order (1-1000).
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: tenant_id
          in: query
          required: false
          description: Optional tenant identifier to scope the timeline to one tenant.
          schema:
            type: string
        - name: target_kind
          in: query
          required: false
          description: Optional ontology target kind to scope events touching that kind.
          schema:
            type: string
        - name: playbook_id
          in: query
          required: false
          description: Optional playbook identifier to scope one playbook workflow.
          schema:
            type: string
        - name: evaluation_run_id
          in: query
          required: false
          description: Optional evaluation run identifier to scope one evaluation workflow.
          schema:
            type: string
      responses:
        '200':
          description: Unified execution timeline report
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Graph platform is not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        maximum: 1000
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
  schemas:
    DeviceEnrollRequest:
      type: object
      required: [bootstrap_token, hardware_uuid]
      properties:
        bootstrap_token:
          type: string
        hardware_uuid:
          type: string
        serial_number:
          type: string
        hostname:
          type: string
        os_type:
          type: string
        agent_version:
          type: string
    DeviceTokenRequest:
      type: object
      required: [grant_type, refresh_token]
      properties:
        grant_type:
          type: string
          enum: [refresh_token]
        refresh_token:
          type: string
        device_id:
          type: string
    DeviceTokenResponse:
      type: object
      properties:
        device_id:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
    AdminDeviceResponse:
      type: object
      properties:
        device_id:
          type: string
        hardware_uuid:
          type: string
        serial_number:
          type: string
        hostname:
          type: string
        org_id:
          type: string
        os_type:
          type: string
        agent_version:
          type: string
        status:
          type: string
        enrolled_at:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties:
            type: string
    AdminDeviceCollection:
      type: object
      properties:
        count:
          type: integer
        devices:
          type: array
          items:
            $ref: '#/components/schemas/AdminDeviceResponse'
    AdminRevokeDeviceRequest:
      type: object
      properties:
        reason:
          type: string
    AdminCreateBootstrapTokenRequest:
      type: object
      required: [hardware_uuid]
      properties:
        hardware_uuid:
          type: string
        org_id:
          type: string
        expires_in_hours:
          type: integer
        scopes:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    AdminCreateBootstrapTokenResponse:
      type: object
      properties:
        token_id:
          type: string
        token:
          type: string
        expires_at:
          type: string
          format: date-time
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
    ReadyResponse:
      type: object
      properties:
        ready:
          type: boolean
        checks:
          type: object
          additionalProperties:
            type: string
    SystemStatusResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        graph_build:
          type: object
          properties:
            state:
              type: string
            last_build_at:
              type: string
              format: date-time
            last_error:
              type: string
            node_count:
              type: integer
        retention:
          type: object
          properties:
            audit_days:
              type: integer
            session_days:
              type: integer
            graph_days:
              type: integer
            access_review_days:
              type: integer
        health:
          type: object
          properties:
            status:
              type: string
            checks:
              type: object
              additionalProperties:
                type: object
        freshness:
          $ref: '#/components/schemas/PlatformGraphFreshnessStatus'
    ForensicsCaptureRequest:
      type: object
      additionalProperties: false
      required:
        - target
      properties:
        id:
          type: string
        incident_id:
          type: string
        workload_id:
          type: string
        requested_by:
          type: string
        reason:
          type: string
        retention_days:
          type: integer
        metadata:
          type: object
          additionalProperties: true
        target:
          $ref: '#/components/schemas/ForensicsWorkloadTarget'
    ForensicsCaptureCollection:
      type: object
      additionalProperties: false
      properties:
        generated_at:
          type: string
          format: date-time
        count:
          type: integer
        captures:
          type: array
          items:
            $ref: '#/components/schemas/ForensicsCaptureRecord'
    ForensicsCaptureRecord:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        incident_id:
          type: string
        workload_id:
          type: string
        status:
          type: string
        requested_by:
          type: string
        reason:
          type: string
        retention_days:
          type: integer
        submitted_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        retain_until:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
        metadata:
          type: object
          additionalProperties: true
        target:
          $ref: '#/components/schemas/ForensicsWorkloadTarget'
        snapshots:
          type: array
          items:
            $ref: '#/components/schemas/ForensicsSnapshotArtifact'
        chain_of_custody:
          type: array
          items:
            $ref: '#/components/schemas/ForensicsCustodyEvent'
    ForensicsRemediationEvidenceRequest:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        incident_id:
          type: string
        workload_id:
          type: string
        before_capture_id:
          type: string
        after_capture_id:
          type: string
        remediation_execution_id:
          type: string
        action_summary:
          type: string
        actor:
          type: string
        status:
          type: string
        notes:
          type: string
        metadata:
          type: object
          additionalProperties: true
    ForensicsRemediationEvidenceRecord:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        incident_id:
          type: string
        workload_id:
          type: string
        before_capture_id:
          type: string
        after_capture_id:
          type: string
        remediation_execution_id:
          type: string
        action_summary:
          type: string
        actor:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        notes:
          type: string
        metadata:
          type: object
          additionalProperties: true
        chain_of_custody:
          type: array
          items:
            $ref: '#/components/schemas/ForensicsCustodyEvent'
    ForensicsEvidencePackage:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        generated_at:
          type: string
          format: date-time
        incident_id:
          type: string
        workload_id:
          type: string
        remediation_evidence:
          $ref: '#/components/schemas/ForensicsRemediationEvidenceRecord'
        remediation_execution:
          $ref: '#/components/schemas/ForensicsRemediationExecutionSummary'
        captures:
          type: array
          items:
            $ref: '#/components/schemas/ForensicsCaptureRecord'
        chain_of_custody:
          type: array
          items:
            $ref: '#/components/schemas/ForensicsCustodyEvent'
    ForensicsRemediationExecutionSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        rule_id:
          type: string
        rule_name:
          type: string
        status:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
    ForensicsCustodyEvent:
      type: object
      additionalProperties: false
      properties:
        step:
          type: string
        actor:
          type: string
        location:
          type: string
        detail:
          type: string
        recorded_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    ForensicsSnapshotArtifact:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        volume_id:
          type: string
        account_id:
          type: string
        project_id:
          type: string
        region:
          type: string
        zone:
          type: string
        size_gib:
          type: integer
        encrypted:
          type: boolean
        scope:
          type: string
        shared:
          type: boolean
        created_at:
          type: string
          format: date-time
        ready_at:
          type: string
          format: date-time
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true
    ForensicsWorkloadTarget:
      type: object
      additionalProperties: false
      properties:
        provider:
          type: string
        account_id:
          type: string
        project_id:
          type: string
        subscription_id:
          type: string
        resource_group:
          type: string
        region:
          type: string
        zone:
          type: string
        instance_id:
          type: string
        instance_name:
          type: string
    PlatformGraphFreshnessStatus:
      type: object
      additionalProperties: false
      properties:
        evaluated_at:
          type: string
          format: date-time
        healthy:
          type: boolean
        breakdown:
          $ref: '#/components/schemas/PlatformGraphFreshnessBreakdown'
        breaches:
          type: array
          items:
            $ref: '#/components/schemas/PlatformGraphFreshnessBreach'
    PlatformGraphFreshnessBreakdown:
      type: object
      additionalProperties: false
      properties:
        generated_at:
          type: string
          format: date-time
        default_stale_after_seconds:
          type: number
        overall:
          $ref: '#/components/schemas/FreshnessMetrics'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/PlatformGraphFreshnessScopeMetrics'
        kinds:
          type: array
          items:
            $ref: '#/components/schemas/PlatformGraphFreshnessScopeMetrics'
    PlatformGraphFreshnessScopeMetrics:
      type: object
      additionalProperties: false
      properties:
        scope:
          type: string
        stale_after_seconds:
          type: number
        total_nodes:
          type: integer
        nodes_with_observed:
          type: integer
        fresh_nodes:
          type: integer
        stale_nodes:
          type: integer
        freshness_percent:
          type: number
        median_age_hours:
          type: number
        p95_age_hours:
          type: number
        oldest_node_age_seconds:
          type: number
        newest_node_age_seconds:
          type: number
        last_sync_time:
          type: string
          format: date-time
    PlatformGraphFreshnessBreach:
      type: object
      additionalProperties: false
      properties:
        provider:
          type: string
        last_sync_time:
          type: string
          format: date-time
        last_sync_age_seconds:
          type: number
        stale_after_seconds:
          type: number
        total_nodes:
          type: integer
        stale_nodes:
          type: integer
    TablesResponse:
      type: object
      properties:
        tables:
