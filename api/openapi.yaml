openapi: 3.0.3
info:
  title: Cerebro API
  description: |
    Cerebro is a cloud security posture management (CSPM) platform that provides:
    - Policy-based security scanning across AWS, GCP, Azure, and Kubernetes
    - Identity and access governance
    - Compliance frameworks and audit reporting
    - Attack path analysis
    - Agent-based investigation
  version: 2.0.0
  contact:
    name: Security Team
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.example.com
    description: Production (replace with your deployment URL)
security:
  - ApiKeyAuth: []
  - BearerAuth: []
tags:
  - name: Health
    description: Health and readiness endpoints
  - name: Assets
    description: Cloud asset inventory
  - name: Policies
    description: Security policy management
  - name: Findings
    description: Security findings and violations
  - name: Compliance
    description: Compliance frameworks and reporting
  - name: Identity
    description: Identity governance and access reviews
  - name: Agents
    description: AI-powered investigation agents
  - name: Tickets
    description: Ticketing integration (Jira, Linear)
  - name: Webhooks
    description: Webhook management
  - name: Admin
    description: Administrative endpoints
  - name: Undocumented
    description: Auto-generated placeholders pending endpoint-level contract documentation
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      tags: [Health]
      summary: Readiness check
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string
  /api/v1/tables:
    get:
      tags: [Assets]
      summary: List available tables
      responses:
        '200':
          description: List of asset tables
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TablesResponse'
  /api/v1/query:
    post:
      tags: [Assets]
      summary: Execute SQL query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
  /api/v1/assets/{table}:
    get:
      tags: [Assets]
      summary: List assets from a table
      parameters:
        - name: table
          in: path
          required: true
          schema:
            type: string
          example: aws_s3_buckets
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetsResponse'
  /api/v1/assets/{table}/{id}:
    get:
      tags: [Assets]
      summary: Get a specific asset
      parameters:
        - name: table
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
  /api/v1/policies:
    get:
      tags: [Policies]
      summary: List all policies
      responses:
        '200':
          description: List of policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoliciesResponse'
    post:
      tags: [Policies]
      summary: Create a new policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Policy'
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
  /api/v1/policies/{id}:
    get:
      tags: [Policies]
      summary: Get a specific policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Policy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
  /api/v1/policies/evaluate:
    post:
      tags: [Policies]
      summary: Evaluate policies against an asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateRequest'
      responses:
        '200':
          description: Evaluation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateResponse'
  /api/v1/findings:
    get:
      tags: [Findings]
      summary: List findings
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low]
        - name: status
          in: query
          schema:
            type: string
            enum: [open, resolved, suppressed]
        - name: policy_id
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of findings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingsResponse'
  /api/v1/findings/stats:
    get:
      tags: [Findings]
      summary: Get findings statistics
      responses:
        '200':
          description: Findings statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingsStats'
  /api/v1/findings/{id}:
    get:
      tags: [Findings]
      summary: Get a specific finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Finding details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Finding'
  /api/v1/findings/scan:
    post:
      tags: [Findings]
      summary: Trigger a security scan
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tables:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Scan results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanResponse'
  /api/v1/findings/{id}/resolve:
    post:
      tags: [Findings]
      summary: Resolve a finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resolution:
                  type: string
      responses:
        '200':
          description: Finding resolved
  /api/v1/findings/{id}/suppress:
    post:
      tags: [Findings]
      summary: Suppress a finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                expires_at:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Finding suppressed
  /api/v1/compliance/frameworks:
    get:
      tags: [Compliance]
      summary: List compliance frameworks
      responses:
        '200':
          description: List of frameworks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworksResponse'
  /api/v1/compliance/frameworks/{id}:
    get:
      tags: [Compliance]
      summary: Get a compliance framework
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: soc2-type2
      responses:
        '200':
          description: Framework details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Framework'
  /api/v1/compliance/frameworks/{id}/report:
    get:
      tags: [Compliance]
      summary: Generate compliance report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Compliance report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceReport'
  /api/v1/compliance/frameworks/{id}/pre-audit:
    get:
      tags: [Compliance]
      summary: Pre-audit health check
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pre-audit assessment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreAuditReport'
  /api/v1/compliance/frameworks/{id}/export:
    get:
      tags: [Compliance]
      summary: Export audit package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit package data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditPackage'
  /api/v1/identity/stale-access:
    get:
      tags: [Identity]
      summary: Detect stale access
      responses:
        '200':
          description: Stale access findings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaleAccessResponse'
  /api/v1/identity/report:
    get:
      tags: [Identity]
      summary: Generate identity report
      responses:
        '200':
          description: Identity posture report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityReport'
  /api/v1/identity/reviews:
    get:
      tags: [Identity]
      summary: List access reviews
      responses:
        '200':
          description: List of access reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewsResponse'
    post:
      tags: [Identity]
      summary: Create access review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessReview'
  /api/v1/agents:
    get:
      tags: [Agents]
      summary: List available agents
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentsResponse'
  /api/v1/agents/sessions:
    post:
      tags: [Agents]
      summary: Create agent session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'
  /api/v1/agents/sessions/{id}/messages:
    get:
      tags: [Agents]
      summary: Get session messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesResponse'
    post:
      tags: [Agents]
      summary: Send message to agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
  /api/v1/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhooks
      responses:
        '200':
          description: List of webhooks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhooksResponse'
