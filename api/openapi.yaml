components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        maximum: 1000
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
    ReadyResponse:
      type: object
      properties:
        ready:
          type: boolean
        checks:
          type: object
          additionalProperties:
            type: string
    SystemStatusResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        graph_build:
          type: object
          properties:
            state:
              type: string
            last_build_at:
              type: string
              format: date-time
            last_error:
              type: string
            node_count:
              type: integer
        retention:
          type: object
          properties:
            audit_days:
              type: integer
            session_days:
              type: integer
            graph_days:
              type: integer
            access_review_days:
              type: integer
        health:
          type: object
          properties:
            status:
              type: string
            checks:
              type: object
              additionalProperties:
                type: object
        freshness:
          $ref: '#/components/schemas/PlatformGraphFreshnessStatus'
    PlatformGraphFreshnessStatus:
      type: object
      additionalProperties: false
      properties:
        evaluated_at:
          type: string
          format: date-time
        healthy:
          type: boolean
        breakdown:
          $ref: '#/components/schemas/PlatformGraphFreshnessBreakdown'
        breaches:
          type: array
          items:
            $ref: '#/components/schemas/PlatformGraphFreshnessBreach'
    PlatformGraphFreshnessBreakdown:
      type: object
      additionalProperties: false
      properties:
        generated_at:
          type: string
          format: date-time
        default_stale_after_seconds:
          type: number
        overall:
          $ref: '#/components/schemas/FreshnessMetrics'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/PlatformGraphFreshnessScopeMetrics'
        kinds:
          type: array
          items:
            $ref: '#/components/schemas/PlatformGraphFreshnessScopeMetrics'
    PlatformGraphFreshnessScopeMetrics:
      type: object
      additionalProperties: false
      properties:
        scope:
          type: string
        stale_after_seconds:
          type: number
        total_nodes:
          type: integer
        nodes_with_observed:
          type: integer
        fresh_nodes:
          type: integer
        stale_nodes:
          type: integer
        freshness_percent:
          type: number
        median_age_hours:
          type: number
        p95_age_hours:
          type: number
        oldest_node_age_seconds:
