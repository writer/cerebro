      description: Return the structural diff between two graph snapshots identified by RFC3339 timestamps.
      parameters:
        - name: from
          in: query
          required: true
          description: RFC3339 timestamp for the starting snapshot.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          description: RFC3339 timestamp for the ending snapshot.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Graph diff result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No snapshots available for the requested timestamps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to compute graph diff
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/graph/who-knows:
