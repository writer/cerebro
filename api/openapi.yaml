                  node_count:
                    type: integer
                  edge_count:
                    type: integer
                  snapshot_count:
                    type: integer
                  last_mutation_at:
                    type: string
                    format: date-time
                  writer_lease:
                    type: object
                    required:
                      - enabled
                      - role
                    properties:
                      enabled:
                        type: boolean
                      role:
                        type: string
                        enum:
                          - disabled
                          - writer
                          - follower
                      lease_name:
                        type: string
                      owner_id:
                        type: string
                      lease_holder_id:
                        type: string
                      lease_until:
                        type: string
                        format: date-time
                      last_heartbeat_at:
                        type: string
                        format: date-time
                      last_transition_at:
                        type: string
                        format: date-time
                      last_error:
                        type: string
                  tier_distribution:
                    type: object
                    required:
                      - hot
                      - warm
                      - cold
                    properties:
                      hot:
                        type: integer
                      warm:
                        type: integer
                      cold:
                        type: integer
                  memory_usage_estimate_bytes:
                    type: integer
                    format: int64
        '503':
          description: Graph platform is not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
