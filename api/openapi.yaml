        '404':
          description: No path exists between selectors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Graph platform is not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/org/clock-speed:
    get:
      tags:
        - Org
