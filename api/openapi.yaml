              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/policies/{id}/rollback:
    post:
      parameters:
        - name: id
          in: path
          required: true
          description: Policy identifier
          schema:
            type: string
      tags:
        - Policies
      summary: Roll back a policy version
      description: Restore the current policy definition to a specific historical version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - version
              properties:
                version:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Rolled-back policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          description: Invalid rollback request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
