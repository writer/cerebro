        - name: customer
          in: query
          required: false
          description: Customer identifier or name to route expertise for.
          schema:
            type: string
        - name: system
          in: query
          required: false
          description: System identifier or name to route expertise for.
          schema:
            type: string
        - name: available
          in: query
          required: false
          description: When true, only return currently available experts.
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
