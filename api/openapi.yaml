openapi: 3.0.3
info:
  title: Cerebro API
  description: 'Cerebro is a graph and intelligence platform with security/CSPM as the first
    major application surface. It provides:

    - A shared graph substrate with ontology, provenance, temporal semantics, ingest,
    identity resolution, and simulation primitives

    - Security workflows for policy scanning, findings, compliance, attack-path analysis,
    runtime detection/response, and remediation

    - Org-intelligence workflows built on the same graph substrate

    - Agent-assisted investigation and write-back

'
  version: 2.0.0
  contact:
    name: Security Team
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.example.com
    description: Production (replace with your deployment URL)
security:
  - ApiKeyAuth: []
  - BearerAuth: []
tags:
  - name: Health
    description: Health and readiness endpoints
  - name: Assets
    description: Cloud asset inventory
  - name: Policies
    description: Security policy management
  - name: Findings
    description: Security findings and violations
  - name: Compliance
    description: Compliance frameworks and reporting
  - name: Identity
    description: Identity governance and access reviews
  - name: Agents
    description: AI-powered investigation agents
  - name: Tickets
    description: Ticketing integration (Jira, Linear)
  - name: Webhooks
    description: Webhook management
  - name: Admin
    description: Administrative endpoints
  - name: Platform
    description: Shared platform primitives built on the graph substrate
  - name: AgentSDK
    description: Universal HTTP and MCP tool gateway for AI agent frameworks
  - name: Security
    description: Security application endpoints layered on the shared platform
  - name: Graph
    description: Legacy graph compatibility endpoints retained while shared primitives move under Platform
  - name: Org
    description: Organizational topology and information-flow analytics endpoints
  - name: Runtime
    description: Runtime detection and response endpoints
  - name: RBAC
    description: Role-based access control and tenancy endpoints
  - name: ThreatIntel
    description: Threat intelligence feed management and indicator lookups
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      tags:
        - Health
      summary: Readiness check
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /status:
    get:
      tags:
        - Health
      summary: Service status
      security: []
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
  /api/v1/status/freshness:
    get:
      tags:
        - Health
      summary: Graph freshness status
      description: Return aggregate plus per-provider and per-kind graph freshness metrics, including configured provider SLA breaches.
      responses:
        '200':
          description: Graph freshness status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformGraphFreshnessStatus'
        '503':
          description: Graph platform is not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /metrics:
    get:
      tags:
        - Health
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string
  /api/v1/tables:
    get:
      tags:
        - Assets
      summary: List available tables
      responses:
        '200':
          description: List of asset tables
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TablesResponse'
  /api/v1/query:
    post:
      tags:
        - Assets
      summary: Execute SQL query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
  /api/v1/assets/{table}:
    get:
      tags:
        - Assets
      summary: List assets from a table
      parameters:
        - name: table
          in: path
          required: true
          schema:
            type: string
          example: aws_s3_buckets
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetsResponse'
  /api/v1/assets/{table}/{id}:
    get:
      tags:
        - Assets
      summary: Get a specific asset
      parameters:
        - name: table
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
  /api/v1/policies:
    get:
      tags:
        - Policies
      summary: List all policies
      responses:
        '200':
          description: List of policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoliciesResponse'
    post:
      tags:
        - Policies
      summary: Create a new policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Policy'
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
  /api/v1/policies/{id}:
    get:
      tags:
        - Policies
      summary: Get a specific policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Policy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
    delete:
      tags:
        - Policies
      summary: Delete a policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Policy deleted
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Policies
      summary: Update an existing policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Policy'
      responses:
        '200':
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          description: Invalid policy payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/policies/evaluate:
    post:
      tags:
        - Policies
      summary: Evaluate a proposed action against policy and propagation controls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateRequest'
      responses:
        '200':
          description: Evaluation decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Graph platform unavailable for propagation evaluation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/policy/evaluate:
    post:
      tags:
        - Policies
      summary: Evaluate a proposed action against policy and propagation controls
      description: Alias endpoint for synchronous pre-action policy enforcement decisions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateRequest'
      responses:
        '200':
          description: Evaluation decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluateResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Graph platform unavailable for propagation evaluation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/findings:
    get:
      tags:
        - Findings
      summary: List findings
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum:
              - critical
              - high
              - medium
              - low
        - name: status
          in: query
          schema:
            type: string
            enum:
              - open
              - resolved
              - suppressed
        - name: policy_id
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of findings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingsResponse'
  /api/v1/findings/stats:
    get:
      tags:
        - Findings
      summary: Get findings statistics
      responses:
        '200':
          description: Findings statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingsStats'
  /api/v1/signals/dashboard:
    get:
      tags:
        - Findings
      summary: Get signals dashboard
      description: Return summary counts, aggregate stats, and recent signal findings for dashboard views.
      responses:
        '200':
          description: Signals dashboard payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      total_signals:
                        type: integer
                      open_signals:
                        type: integer
                      snoozed_signals:
                        type: integer
                  stats:
                    type: object
                    additionalProperties: true
                  recent_signals:
                    type: array
                    items:
                      $ref: '#/components/schemas/Finding'
                  count:
                    type: integer
  /api/v1/findings/{id}:
    get:
      tags:
        - Findings
      summary: Get a specific finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Finding details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Finding'
    delete:
      tags:
        - Findings
      summary: Soft delete a finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Finding deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/findings/scan:
    post:
      tags:
        - Findings
      summary: Trigger a security scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                table:
                  type: string
                tables:
                  type: array
                  items:
                    type: string
                limit:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Scan results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanResponse'
        '400':
          description: Invalid scan request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Scan unavailable because Snowflake is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/findings/{id}/resolve:
    post:
      tags:
        - Findings
      summary: Resolve a finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resolution:
                  type: string
      responses:
        '200':
          description: Finding resolved
  /api/v1/findings/{id}/suppress:
    post:
      tags:
        - Findings
      summary: Suppress a finding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                expires_at:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Finding suppressed
  /api/v1/compliance/frameworks:
    get:
      tags:
        - Compliance
      summary: List compliance frameworks
      responses:
        '200':
          description: List of frameworks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworksResponse'
  /api/v1/compliance/frameworks/{id}:
    get:
      tags:
        - Compliance
      summary: Get a compliance framework
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: soc2-type2
      responses:
        '200':
          description: Framework details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Framework'
  /api/v1/compliance/frameworks/{id}/report:
    get:
      tags:
        - Compliance
      summary: Generate compliance report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Compliance report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceReport'
  /api/v1/compliance/frameworks/{id}/pre-audit:
    get:
      tags:
        - Compliance
      summary: Pre-audit health check
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pre-audit assessment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreAuditReport'
  /api/v1/compliance/frameworks/{id}/export:
    get:
      tags:
        - Compliance
      summary: Export audit package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit package data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditPackage'
  /api/v1/identity/stale-access:
    get:
      tags:
        - Identity
      summary: Detect stale access
      responses:
        '200':
          description: Stale access findings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaleAccessResponse'
  /api/v1/identity/report:
    get:
      tags:
        - Identity
      summary: Generate identity report
      responses:
        '200':
          description: Identity posture report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityReport'
  /api/v1/identity/reviews:
    get:
      tags:
        - Identity
      summary: List access reviews
      responses:
        '200':
          description: List of access reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewsResponse'
    post:
      tags:
        - Identity
      summary: Create access review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessReview'
  /api/v1/agents:
    get:
      tags:
        - Agents
      summary: List available agents
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentsResponse'
  /api/v1/agents/sessions:
    post:
      tags:
        - Agents
      summary: Create agent session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSession'
  /api/v1/agents/sessions/{id}/messages:
    get:
      tags:
        - Agents
      summary: Get session messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesResponse'
    post:
      tags:
        - Agents
      summary: Send message to agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
  /api/v1/webhooks:
    get:
      tags:
        - Webhooks
      summary: List webhooks
      responses:
        '200':
          description: List of webhooks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhooksResponse'
    post:
      tags:
        - Webhooks
      summary: Create webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
  /api/v1/webhooks/{id}:
    get:
      tags:
        - Webhooks
      summary: Get webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
    delete:
      tags:
        - Webhooks
      summary: Delete webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Webhook deleted
  /api/v1/admin/health:
    get:
      tags:
        - Admin
      summary: System health dashboard
      responses:
        '200':
          description: System health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminHealth'
  /api/v1/admin/sync/status:
    get:
      tags:
        - Admin
      summary: Data sync status
      responses:
        '200':
          description: Sync status per provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatus'
  /api/v1/sync/aws:
    post:
      tags:
        - Admin
      summary: Run AWS native sync
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                profile:
                  type: string
                region:
                  type: string
                multi_region:
                  type: boolean
                concurrency:
                  type: integer
                  minimum: 1
                tables:
                  type: array
                  items:
                    type: string
                validate:
                  type: boolean
      responses:
        '200':
          description: AWS sync run complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncRunResponse'
        '400':
          description: Invalid AWS sync request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: AWS sync unavailable because Snowflake is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/sync/aws-org:
    post:
      tags:
        - Admin
      summary: Run AWS organization sync
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                profile:
                  type: string
                region:
                  type: string
                multi_region:
                  type: boolean
                concurrency:
                  type: integer
                  minimum: 1
                tables:
                  type: array
                  items:
                    type: string
                validate:
                  type: boolean
                org_role:
                  type: string
                include_accounts:
                  type: array
                  items:
                    type: string
                exclude_accounts:
                  type: array
                  items:
                    type: string
                account_concurrency:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: AWS organization sync run complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncRunResponse'
        '400':
          description: Invalid AWS organization sync request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: AWS organization sync unavailable because Snowflake is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/sync/backfill-relationships:
    post:
      tags:
        - Admin
      summary: Normalize relationship IDs in Snowflake
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                batch_size:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Relationship backfill complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipBackfillResponse'
        '400':
          description: Invalid backfill request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Backfill unavailable because Snowflake is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/sync/azure:
    post:
      tags:
        - Admin
      summary: Run Azure native sync
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                subscription:
                  type: string
                concurrency:
                  type: integer
                  minimum: 1
                tables:
                  type: array
                  items:
                    type: string
                validate:
                  type: boolean
      responses:
        '200':
          description: Azure sync run complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncRunResponse'
        '400':
          description: Invalid Azure sync request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Azure sync unavailable because Snowflake is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/sync/gcp:
    post:
      tags:
        - Admin
      summary: Run GCP native sync
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                project:
                  type: string
                concurrency:
                  type: integer
                  minimum: 1
                tables:
                  type: array
                  items:
                    type: string
                validate:
                  type: boolean
              required:
                - project
      responses:
        '200':
          description: GCP sync run complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncRunResponse'
        '400':
          description: Invalid GCP sync request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: GCP sync unavailable because Snowflake is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/sync/gcp-asset:
    post:
      tags:
        - Admin
      summary: Run GCP Cloud Asset Inventory sync
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                projects:
                  type: array
                  items:
                    type: string
                concurrency:
                  type: integer
                  minimum: 1
                tables:
                  type: array
                  items:
                    type: string
                validate:
                  type: boolean
              required:
                - projects
      responses:
        '200':
          description: GCP asset sync run complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncRunResponse'
        '400':
