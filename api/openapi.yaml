      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Graph change evaluation result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid graph change request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Graph platform is not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/graph/simulate:
    post:
      tags:
        - Graph
      summary: Simulate graph mutations
