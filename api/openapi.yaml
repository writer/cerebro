components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        maximum: 1000
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
    ReadyResponse:
      type: object
      properties:
        ready:
          type: boolean
        checks:
          type: object
          additionalProperties:
            type: string
    TablesResponse:
      type: object
      properties:
        tables:
          type: array
          items:
            type: string
        count:
          type: integer
    QueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          example: "SELECT * FROM aws_s3_buckets LIMIT 10"
        limit:
          type: integer
    QueryResponse:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: object
        count:
          type: integer
    AssetsResponse:
      type: object
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        count:
          type: integer
        pagination:
          $ref: '#/components/schemas/Pagination'
    Asset:
      type: object
      additionalProperties: true
    Policy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        effect:
          type: string
          enum: [permit, forbid]
        resource:
          type: string
        conditions:
          type: array
          items:
            type: string
        severity:
          type: string
          enum: [critical, high, medium, low]
        tags:
          type: array
          items:
            type: string
    PoliciesResponse:
      type: object
      properties:
        policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        count:
          type: integer
    EvaluateRequest:
      type: object
      properties:
        asset:
          type: object
        policy_ids:
          type: array
          items:
            type: string
    EvaluateResponse:
      type: object
      properties:
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
    Finding:
      type: object
      properties:
        id:
          type: string
        policy_id:
          type: string
        policy_name:
          type: string
        severity:
          type: string
        status:
          type: string
        resource:
          type: object
        description:
          type: string
        remediation:
          type: string
        created_at:
          type: string
          format: date-time
    FindingsResponse:
      type: object
      properties:
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
        count:
          type: integer
        pagination:
          $ref: '#/components/schemas/Pagination'
    FindingsStats:
      type: object
      properties:
        total:
          type: integer
        by_severity:
          type: object
          additionalProperties:
            type: integer
        by_status:
          type: object
          additionalProperties:
            type: integer
        by_policy:
          type: object
          additionalProperties:
            type: integer
    ScanResponse:
      type: object
      properties:
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
        scanned:
          type: integer
        duration_ms:
          type: integer
    Framework:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        controls:
          type: array
          items:
            $ref: '#/components/schemas/Control'
    Control:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        policy_ids:
          type: array
