      description: Evaluate a candidate policy revision against request-supplied or fetched assets without persisting changes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Dry-run impact result
