            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid mutation payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Graph platform is not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/org/reorg-simulations:
