schemas:
  HealthResponse:
    type: object
    properties:
      status:
        type: string
        example: healthy
      timestamp:
        type: string
        format: date-time
  ReadyResponse:
    type: object
    properties:
      ready:
        type: boolean
      checks:
        type: object
        additionalProperties:
          type: string
  SystemStatusResponse:
    type: object
    properties:
      timestamp:
        type: string
        format: date-time
      graph_build:
        type: object
        properties:
          state:
            type: string
          last_build_at:
            type: string
            format: date-time
          last_error:
            type: string
          node_count:
            type: integer
      retention:
        type: object
        properties:
          audit_days:
            type: integer
          session_days:
            type: integer
          graph_days:
            type: integer
          access_review_days:
            type: integer
      health:
        type: object
        properties:
          status:
            type: string
          checks:
            type: object
            additionalProperties:
              type: object
      freshness:
        $ref: '#/components/schemas/PlatformGraphFreshnessStatus'
  ForensicsCaptureRequest:
    type: object
    additionalProperties: false
    required:
      - target
    properties:
      id:
        type: string
      incident_id:
        type: string
      workload_id:
        type: string
      requested_by:
        type: string
      reason:
        type: string
      retention_days:
        type: integer
      metadata:
        type: object
        additionalProperties: true
      target:
        $ref: '#/components/schemas/ForensicsWorkloadTarget'
  ForensicsCaptureCollection:
    type: object
    additionalProperties: false
    properties:
      generated_at:
        type: string
        format: date-time
      count:
        type: integer
      captures:
        type: array
        items:
          $ref: '#/components/schemas/ForensicsCaptureRecord'
  ForensicsCaptureRecord:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      incident_id:
        type: string
      workload_id:
        type: string
      status:
        type: string
      requested_by:
        type: string
      reason:
        type: string
      retention_days:
        type: integer
      submitted_at:
        type: string
        format: date-time
      completed_at:
        type: string
        format: date-time
        nullable: true
      retain_until:
        type: string
        format: date-time
        nullable: true
      error:
        type: string
      metadata:
        type: object
        additionalProperties: true
      target:
        $ref: '#/components/schemas/ForensicsWorkloadTarget'
      snapshots:
        type: array
        items:
          $ref: '#/components/schemas/ForensicsSnapshotArtifact'
      chain_of_custody:
        type: array
        items:
          $ref: '#/components/schemas/ForensicsCustodyEvent'
  ForensicsRemediationEvidenceRequest:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      incident_id:
        type: string
      workload_id:
        type: string
      before_capture_id:
        type: string
      after_capture_id:
        type: string
      remediation_execution_id:
        type: string
      action_summary:
        type: string
      actor:
        type: string
      status:
        type: string
      notes:
        type: string
      metadata:
        type: object
        additionalProperties: true
  ForensicsRemediationEvidenceRecord:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      incident_id:
        type: string
      workload_id:
        type: string
      before_capture_id:
        type: string
      after_capture_id:
        type: string
      remediation_execution_id:
        type: string
      action_summary:
        type: string
      actor:
        type: string
      status:
        type: string
      created_at:
        type: string
        format: date-time
      notes:
        type: string
      metadata:
        type: object
        additionalProperties: true
      chain_of_custody:
        type: array
        items:
          $ref: '#/components/schemas/ForensicsCustodyEvent'
  ForensicsEvidencePackage:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      generated_at:
        type: string
        format: date-time
      incident_id:
        type: string
      workload_id:
        type: string
      remediation_evidence:
        $ref: '#/components/schemas/ForensicsRemediationEvidenceRecord'
      remediation_execution:
        $ref: '#/components/schemas/ForensicsRemediationExecutionSummary'
      captures:
        type: array
        items:
          $ref: '#/components/schemas/ForensicsCaptureRecord'
      chain_of_custody:
        type: array
        items:
          $ref: '#/components/schemas/ForensicsCustodyEvent'
  ForensicsRemediationExecutionSummary:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      rule_id:
        type: string
      rule_name:
        type: string
      status:
        type: string
      started_at:
        type: string
        format: date-time
        nullable: true
      completed_at:
        type: string
        format: date-time
        nullable: true
      error:
        type: string
  ForensicsCustodyEvent:
    type: object
    additionalProperties: false
    properties:
      step:
        type: string
      actor:
        type: string
      location:
        type: string
      detail:
        type: string
      recorded_at:
        type: string
        format: date-time
      metadata:
        type: object
        additionalProperties: true
  ForensicsSnapshotArtifact:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      volume_id:
        type: string
      account_id:
        type: string
      project_id:
        type: string
      region:
        type: string
      zone:
        type: string
      size_gib:
        type: integer
      encrypted:
        type: boolean
      scope:
        type: string
      shared:
        type: boolean
      created_at:
        type: string
        format: date-time
      ready_at:
        type: string
        format: date-time
        nullable: true
      deleted_at:
        type: string
        format: date-time
        nullable: true
      metadata:
        type: object
        additionalProperties: true
  ForensicsWorkloadTarget:
    type: object
    additionalProperties: false
    properties:
      provider:
        type: string
      account_id:
        type: string
      project_id:
        type: string
      subscription_id:
        type: string
      resource_group:
        type: string
      region:
        type: string
      zone:
        type: string
      instance_id:
        type: string
      instance_name:
        type: string
  PlatformGraphFreshnessStatus:
    type: object
    additionalProperties: false
    properties:
      evaluated_at:
        type: string
        format: date-time
      healthy:
        type: boolean
      breakdown:
        $ref: '#/components/schemas/PlatformGraphFreshnessBreakdown'
      breaches:
        type: array
        items:
          $ref: '#/components/schemas/PlatformGraphFreshnessBreach'
  PlatformGraphFreshnessBreakdown:
    type: object
    additionalProperties: false
    properties:
      generated_at:
        type: string
        format: date-time
      default_stale_after_seconds:
        type: number
      overall:
        $ref: '#/components/schemas/FreshnessMetrics'
      providers:
        type: array
        items:
          $ref: '#/components/schemas/PlatformGraphFreshnessScopeMetrics'
      kinds:
        type: array
        items:
          $ref: '#/components/schemas/PlatformGraphFreshnessScopeMetrics'
  PlatformGraphFreshnessScopeMetrics:
    type: object
    additionalProperties: false
    properties:
      scope:
        type: string
      stale_after_seconds:
        type: number
      total_nodes:
        type: integer
      nodes_with_observed:
        type: integer
      fresh_nodes:
        type: integer
      stale_nodes:
        type: integer
      freshness_percent:
        type: number
      median_age_hours:
        type: number
      p95_age_hours:
        type: number
      oldest_node_age_seconds:
        type: number
      newest_node_age_seconds:
        type: number
      last_sync_time:
        type: string
        format: date-time
  PlatformGraphFreshnessBreach:
    type: object
    additionalProperties: false
    properties:
      provider:
        type: string
      last_sync_time:
        type: string
        format: date-time
      last_sync_age_seconds:
        type: number
      stale_after_seconds:
        type: number
      total_nodes:
        type: integer
      stale_nodes:
        type: integer
  TablesResponse:
    type: object
    properties:
      tables:
        type: array
        items:
          type: string
      count:
        type: integer
  QueryRequest:
    type: object
    required:
      - query
    properties:
      query:
        type: string
        example: SELECT * FROM aws_s3_buckets LIMIT 10
      limit:
        type: integer
  QueryResponse:
    type: object
    properties:
      columns:
        type: array
        items:
          type: string
      rows:
        type: array
        items:
          type: object
      count:
        type: integer
  AssetsResponse:
    type: object
    properties:
      assets:
        type: array
        items:
          $ref: '#/components/schemas/Asset'
      count:
        type: integer
      pagination:
        $ref: '#/components/schemas/Pagination'
  Asset:
    type: object
    additionalProperties: true
  Policy:
    type: object
    properties:
      id:
        type: string
      name:
        type: string
      description:
        type: string
      effect:
        type: string
        enum:
          - permit
          - forbid
      resource:
        type: string
      condition_format:
        type: string
        enum:
          - legacy
          - cel
      conditions:
        type: array
        items:
          type: string
      severity:
        type: string
        enum:
          - critical
          - high
          - medium
          - low
      tags:
        type: array
        items:
          type: string
  PoliciesResponse:
    type: object
    properties:
      policies:
        type: array
        items:
          $ref: '#/components/schemas/Policy'
      count:
        type: integer
  EvaluateRequest:
    type: object
    required:
      - action
      - resource
    properties:
      principal:
        type: object
        additionalProperties: true
      action:
        type: string
      resource:
        type: object
        additionalProperties: true
      context:
        type: object
        additionalProperties: true
      proposed_change:
        type: object
        additionalProperties: true
  EvaluateResponse:
    type: object
    properties:
      decision:
        type: string
        enum:
          - allow
          - deny
          - require_approval
      requires_approval:
        type: boolean
      matched:
        type: array
        items:
          type: string
      reasons:
        type: array
        items:
          type: string
      remediation_steps:
        type: array
        items:
          type: string
      policy_evaluation:
        type: object
        additionalProperties: true
      propagation:
        type: object
        additionalProperties: true
  Finding:
    type: object
    properties:
      id:
        type: string
      semantic_key:
        type: string
      observed_finding_ids:
        type: array
        items:
          type: string
      observed_policy_ids:
        type: array
        items:
          type: string
      policy_id:
        type: string
      policy_name:
        type: string
      severity:
        type: string
      status:
        type: string
      resource:
        type: object
      description:
        type: string
      remediation:
        type: string
      created_at:
        type: string
        format: date-time
  FindingsResponse:
    type: object
    properties:
      findings:
        type: array
        items:
          $ref: '#/components/schemas/Finding'
      count:
        type: integer
      pagination:
        $ref: '#/components/schemas/Pagination'
  FindingsStats:
    type: object
    properties:
      total:
        type: integer
      by_severity:
        type: object
        additionalProperties:
          type: integer
      by_status:
        type: object
        additionalProperties:
          type: integer
      by_policy:
        type: object
        additionalProperties:
          type: integer
  ScanResponse:
    type: object
    required:
      - scanned
      - violations
      - duration
      - findings
      - tables
    properties:
      findings:
        type: array
        items:
          $ref: '#/components/schemas/Finding'
      scanned:
        type: integer
      violations:
        type: integer
      duration:
        type: string
      tables:
        type: array
        items:
          $ref: '#/components/schemas/ScanTableResult'
  ScanTableResult:
    type: object
    required:
      - table
      - scanned
      - violations
      - duration
    properties:
      table:
        type: string
      scanned:
        type: integer
      violations:
        type: integer
      duration:
        type: string
  Framework:
    type: object
    properties:
      id:
        type: string
      name:
        type: string
      version:
        type: string
      description:
        type: string
      controls:
        type: array
        items:
          $ref: '#/components/schemas/Control'
  Control:
    type: object
    properties:
      id:
        type: string
      title:
        type: string
      description:
        type: string
      severity:
        type: string
      policy_ids:
        type: array
        items:
          type: string
      graph_queries:
        type: array
        items:
          $ref: '#/components/schemas/GraphQueryDefinition'
  GraphQueryDefinition:
    type: object
    properties:
      id:
        type: string
      provider:
        type: string
      description:
        type: string
  FrameworksResponse:
    type: object
    properties:
      frameworks:
        type: array
        items:
          $ref: '#/components/schemas/Framework'
      count:
        type: integer
  ComplianceReport:
    type: object
    properties:
      framework_id:
        type: string
      framework_name:
        type: string
      generated_at:
        type: string
        format: date-time
      summary:
        $ref: '#/components/schemas/ComplianceSummary'
      controls:
        type: array
        items:
          $ref: '#/components/schemas/ControlStatus'
  ComplianceSummary:
    type: object
    properties:
      total_controls:
        type: integer
      passing_controls:
        type: integer
      failing_controls:
        type: integer
      partial_controls:
        type: integer
      not_applicable_controls:
        type: integer
      compliance_score:
        type: number
      weighted_score:
        type: number
      graph_evaluated_controls:
        type: integer
      fallback_controls:
        type: integer
  ControlEvidence:
    type: object
    properties:
      entity_id:
        type: string
      entity_kind:
        type: string
      entity_name:
        type: string
      facet_id:
        type: string
      policy_id:
        type: string
      status:
        type: string
        enum:
          - passing
          - failing
          - partial
          - not_applicable
          - unknown
      reason:
        type: string
  ControlStatus:
    type: object
    properties:
      control_id:
        type: string
      title:
        type: string
      description:
        type: string
      severity:
        type: string
      status:
        type: string
        enum:
          - passing
          - failing
          - partial
          - not_applicable
          - unknown
      pass_count:
        type: integer
        description: "Count of graph-identified assets currently passing this control; findings-fallback controls leave this at 0 because asset counts are not inferred from findings alone."
      fail_count:
        type: integer
        description: "Count of graph-identified assets currently failing this control; findings-fallback controls leave this at 0 because asset counts are not inferred from findings alone."
      total_assets:
        type: integer
        description: "Count of graph-identified assets evaluated for this control; findings-fallback controls leave this at 0 when the graph cannot enumerate an evaluated asset set."
      evaluation_source:
        type: string
        description: "findings_fallback determines control state from mapped findings only and does not imply graph-backed asset counts."
        enum:
          - graph
          - findings_fallback
          - hybrid
      last_evaluated:
        type: string
        format: date-time
      policy_ids:
        type: array
        items:
          type: string
      evidence:
        type: array
        items:
          $ref: '#/components/schemas/ControlEvidence'
  ComplianceFrameworkStatusControl:
    type: object
    properties:
      control_id:
        type: string
      title:
        type: string
      description:
        type: string
      severity:
        type: string
      status:
        type: string
        enum:
          - passing
          - failing
          - partial
          - not_applicable
          - unknown
      pass_count:
        type: integer
      fail_count:
        type: integer
      total_assets:
        type: integer
      evaluation_source:
        type: string
        enum:
          - graph
          - findings_fallback
          - hybrid
      last_evaluated:
        type: string
        format: date-time
      policy_ids:
        type: array
        items:
          type: string
      graph_queries:
        type: array
        items:
          $ref: '#/components/schemas/GraphQueryDefinition'
  FrameworkComplianceStatusResponse:
    type: object
    properties:
      framework_id:
        type: string
      framework_name:
        type: string
      version:
        type: string
      generated_at:
        type: string
        format: date-time
      valid_at:
        type: string
        format: date-time
      recorded_at:
        type: string
        format: date-time
      summary:
        $ref: '#/components/schemas/ComplianceSummary'
      controls:
        type: array
        items:
          $ref: '#/components/schemas/ComplianceFrameworkStatusControl'
      total_findings:
        type: integer
  ComplianceControlDetailResponse:
    type: object
    properties:
      framework_id:
        type: string
      framework_name:
        type: string
      version:
        type: string
      generated_at:
        type: string
        format: date-time
      valid_at:
        type: string
        format: date-time
      recorded_at:
        type: string
        format: date-time
      control:
        $ref: '#/components/schemas/Control'
      status:
        $ref: '#/components/schemas/ControlStatus'
  PreAuditReport:
    type: object
    properties:
      framework_id:
        type: string
      estimated_outcome:
        type: string
      summary:
        type: object
      controls:
        type: array
        items:
          type: object
      recommendations:
        type: array
        items:
          type: string
  AuditPackage:
    type: object
    properties:
      manifest:
        type: object
      summary:
        type: object
      controls:
        type: array
        items:
          type: object
          properties:
            control_id:
              type: string
            title:
              type: string
            description:
              type: string
            status:
              type: string
            policies:
              type: array
              items:
                type: string
            findings:
              type: array
              items:
                type: string
            finding_count:
              type: integer
            evaluation_source:
              type: string
            last_evaluated:
              type: string
              format: date-time
            evidence:
              type: array
              items:
                $ref: '#/components/schemas/ControlEvidence'
  StaleAccessResponse:
    type: object
    properties:
      findings:
        type: array
        items:
          $ref: '#/components/schemas/StaleAccessFinding'
      count:
        type: integer
      summary:
        type: object
  StaleAccessFinding:
    type: object
    properties:
      id:
        type: string
      type:
        type: string
      severity:
        type: string
      principal:
        type: object
      provider:
        type: string
      last_activity:
        type: string
        format: date-time
      days_since:
        type: integer
      details:
        type: string
      remediation:
        type: string
  IdentityReport:
    type: object
    properties:
      generated_at:
        type: string
        format: date-time
      summary:
        type: object
      by_provider:
        type: object
      stale_access:
        type: object
      privileged_users:
        type: array
        items:
          type: object
      recommendations:
        type: array
        items:
          type: string
  AccessReview:
    type: object
    properties:
      id:
        type: string
      name:
        type: string
      description:
        type: string
      type:
        type: string
      status:
        type: string
      scope:
        $ref: '#/components/schemas/ReviewScope'
      schedule:
        $ref: '#/components/schemas/ReviewSchedule'
      reviewers:
        type: array
        items:
          type: string
      items:
        type: array
        items:
          $ref: '#/components/schemas/ReviewItem'
      stats:
        $ref: '#/components/schemas/ReviewStats'
      created_by:
        type: string
      created_at:
        type: string
        format: date-time
      started_at:
        type: string
        format: date-time
      due_at:
        type: string
        format: date-time
      completed_at:
        type: string
        format: date-time
      generation_source:
        type: string
      events:
        type: array
        items:
          $ref: '#/components/schemas/ReviewEvent'
      metadata:
        type: object
        additionalProperties: true
  ReviewsResponse:
    type: object
    properties:
      reviews:
        type: array
        items:
          $ref: '#/components/schemas/AccessReview'
      count:
        type: integer
  CreateReviewRequest:
    type: object
    required:
      - name
      - type
    properties:
      name:
        type: string
      description:
        type: string
      type:
        type: string
        enum:
          - user_access
          - service_account
          - privileged
          - entitlement
          - application
      created_by:
        type: string
      scope:
        $ref: '#/components/schemas/ReviewScope'
      schedule:
        $ref: '#/components/schemas/ReviewSchedule'
      reviewers:
        type: array
        items:
          type: string
      due_at:
        type: string
        format: date-time
  ReviewScope:
    type: object
    properties:
      mode:
        type: string
        enum:
          - all
          - account
          - principal
          - resource
          - high_risk
          - cross_account
          - privilege_creep
      providers:
        type: array
        items:
          type: string
      accounts:
        type: array
        items:
          type: string
      applications:
        type: array
        items:
          type: string
      roles:
        type: array
        items:
          type: string
      users:
        type: array
        items:
          type: string
      resources:
        type: array
        items:
          type: string
      risk_levels:
        type: array
        items:
          type: string
  ReviewSchedule:
    type: object
    properties:
      frequency:
        type: string
      next_run:
        type: string
        format: date-time
      last_run:
        type: string
        format: date-time
  ReviewItem:
    type: object
    properties:
      id:
        type: string
      review_id:
        type: string
      type:
        type: string
      principal:
        $ref: '#/components/schemas/ReviewPrincipal'
      access:
        type: array
        items:
          $ref: '#/components/schemas/ReviewAccessGrant'
      risk_score:
        type: integer
      risk_factors:
        type: array
        items:
          type: string
      decision:
        $ref: '#/components/schemas/ReviewDecision'
      recommendation:
        $ref: '#/components/schemas/ReviewRecommendation'
      reviewer_candidates:
        type: array
        items:
          type: string
      last_activity:
        type: string
        format: date-time
      path:
        type: array
        items:
          type: string
      flags:
        type: array
        items:
          type: string
      metadata:
        type: object
        additionalProperties: true
  ReviewPrincipal:
    type: object
    properties:
      id:
        type: string
      type:
        type: string
      name:
        type: string
      email:
        type: string
      provider:
        type: string
      account:
        type: string
      last_login:
        type: string
        format: date-time
      created_at:
        type: string
        format: date-time
  ReviewAccessGrant:
    type: object
    properties:
      id:
        type: string
      resource:
        type: string
      resource_type:
        type: string
      permission:
        type: string
      role:
        type: string
      granted_at:
        type: string
        format: date-time
      expires_at:
        type: string
        format: date-time
      granted_by:
