openapi: 3.0.3
info:
  title: Cerebro API
  description: 'Cerebro is a graph and intelligence platform with security/CSPM as the first major application surface. It provides:

    - A shared graph substrate with ontology, provenance, temporal semantics, ingest, identity resolution, and simulation primitives

    - Security workflows for policy scanning, findings, compliance, attack-path analysis, runtime detection/response, and remediation

    - Org-intelligence workflows built on the same graph substrate

    - Agent-assisted investigation and write-back

'
  version: 2.0.0
  contact:
    name: Security Team
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.example.com
    description: Production (replace with your deployment URL)
security:
  - ApiKeyAuth: []
  - BearerAuth: []
