/api/v1/org/expertise/queries:
  get:
    tags:
      - Org
    summary: Rank experts for a topic, customer, or system
    description: Return a ranked list of people who are most likely to have relevant knowledge, with availability-aware routing.
    parameters:
      - name: topic
        in: query
        required: false
        schema:
          type: string
      - name: customer
        in: query
        required: false
        schema:
          type: string
      - name: system
        in: query
        required: false
        schema:
          type: string
      - name: available
        in: query
        required: false
        schema:
          type: boolean
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 25
    responses:
      '200':
        description: Ranked knowledge candidates
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '400':
        description: Missing required query parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/org/policies:
  post:
    tags:
      - Org
    summary: Create or update an organizational policy registry entry
    description: Upsert one organizational policy definition, optionally instantiating it from a built-in compliance template and assigning departments or people who must acknowledge it.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    responses:
      '200':
        description: Policy registry update result
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '400':
        description: Invalid organizational policy payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/org/policies/templates:
  get:
    tags:
      - Org
    summary: List organizational policy templates
    description: Return the built-in policy template catalog, optionally filtered to one framework family such as SOC 2 or ISO 27001.
    parameters:
      - name: framework
        in: query
        required: false
        description: Optional canonical framework family filter.
        schema:
          type: string
    responses:
      '200':
        description: Organizational policy templates
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
/api/v1/org/policies/program-status:
  get:
    tags:
      - Org
    summary: Summarize policy acknowledgment coverage across the program
    description: Return aggregate acknowledgment posture across all registered organizational policies, optionally scoped to one framework family.
    parameters:
      - name: framework
        in: query
        required: false
        description: Optional canonical framework family filter.
        schema:
          type: string
    responses:
      '200':
        description: Program-level organizational policy status
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/org/policies/review-schedule:
  get:
    tags:
      - Org
    summary: List organizational policies due for review
    description: Return review cadence and due-date posture for all organizational policies with a configured review cycle.
    parameters:
      - name: as_of
        in: query
        required: false
        description: Optional RFC3339 timestamp used as the review schedule baseline.
        schema:
          type: string
          format: date-time
    responses:
      '200':
        description: Organizational policy review schedule
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '400':
        description: Invalid as_of timestamp
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/org/policies/{id}/acknowledge:
  post:
    tags:
      - Org
    summary: Record one employee acknowledgment for a policy
    description: Write one current-version policy acknowledgment edge from a person to an organizational policy.
    parameters:
      - name: id
        in: path
        required: true
        description: Policy node ID.
        schema:
          type: string
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    responses:
      '200':
        description: Organizational policy acknowledgment result
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '400':
        description: Invalid acknowledgment payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Policy or person not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
