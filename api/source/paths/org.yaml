/api/v1/org/information-flow:
  get:
    tags:
      - Org
    summary: Compute shortest information path between two endpoints
    description: Return the shortest information flow path and estimated latency between the provided endpoints.
    parameters:
      - name: from
        in: query
        required: true
        description: Source selector (node ID, name, or team/<name>).
        schema:
          type: string
      - name: to
        in: query
        required: true
        description: Destination selector (node ID, name, or team/<name>).
        schema:
          type: string
    responses:
      '200':
        description: Information path result
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '400':
        description: Missing from/to selectors
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: No path exists between selectors
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
