              $ref: '#/components/schemas/Error'
/api/v1/platform/graph/changelog:
  get:
    tags:
      - Platform
    summary: List recent graph snapshot changes
    description: Return adjacent graph snapshot diffs within the requested window, optionally filtered by kind, provider, or account.
    parameters:
      - name: since
        in: query
        description: Optional RFC3339 lower bound.
        schema:
          type: string
          format: date-time
      - name: until
        in: query
        description: Optional RFC3339 upper bound.
        schema:
          type: string
          format: date-time
      - name: last
        in: query
        description: Optional relative duration window, for example 24h or 7d.
        schema:
          type: string
      - name: kind
        in: query
        schema:
          type: string
      - name: provider
        in: query
        schema:
          type: string
      - name: account
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 20
    responses:
      '200':
        description: Graph changelog collection
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformGraphChangelog'
      '400':
        description: Invalid changelog query parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/platform/graph/queries:
  get:
    tags:
      - Platform
    summary: Run bounded platform graph neighborhood and path queries
    description: Query the shared graph platform through a stable read surface with temporal scoping.
    parameters:
      - name: mode
        in: query
        required: false
        description: Query mode. Defaults to neighbors.
        schema:
          type: string
          enum:
            - neighbors
            - paths
      - name: node_id
        in: query
        required: true
        description: Source node identifier.
        schema:
          type: string
      - name: direction
        in: query
        required: false
        description: Direction filter for neighbors mode.
        schema:
          type: string
          enum:
            - in
            - out
            - both
      - name: limit
        in: query
        required: false
        description: Result limit for neighbors mode (1-200).
        schema:
          type: integer
          minimum: 1
          maximum: 200
      - name: target_id
        in: query
        required: false
        description: Required target node for paths mode.
        schema:
          type: string
      - name: k
        in: query
        required: false
        description: Number of shortest paths to return (1-10) in paths mode.
        schema:
          type: integer
          minimum: 1
          maximum: 10
      - name: max_depth
        in: query
        required: false
        description: Maximum path depth (1-12) in paths mode.
        schema:
          type: integer
          minimum: 1
          maximum: 12
      - name: as_of
        in: query
        required: false
        description: Optional RFC3339 point-in-time scope for nodes/edges active at a single timestamp.
        schema:
          type: string
          format: date-time
      - name: from
        in: query
        required: false
        description: Optional RFC3339 temporal window start (requires to).
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        required: false
        description: Optional RFC3339 temporal window end (requires from).
        schema:
          type: string
          format: date-time
    responses:
      '200':
        description: Query result payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformGraphQueryResponse'
      '400':
        description: Invalid query parameter
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Requested node was not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
  post:
    tags:
      - Platform
    summary: Run a typed platform graph query
    description: Typed platform query interface for bounded neighborhood and path analysis with temporal scoping.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PlatformGraphQueryRequest'
    responses:
      '200':
        description: Query result payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformGraphQueryResponse'
      '400':
        description: Invalid request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Requested node was not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
