/api/v1/platform/intelligence/event-correlations:
  get:
    tags:
      - Platform
    summary: Query derived event correlation links
    description: Returns materialized causal event links for one event or entity neighborhood, with optional scoped anomaly summaries.
    parameters:
      - name: event_id
        in: query
        required: false
        description: Event node ID seed for expanding a local causal neighborhood. Either `event_id` or `entity_id` is required.
        schema:
          type: string
      - name: entity_id
        in: query
        required: false
        description: Entity ID scope (for example `service:payments`) used to find related events. Either `event_id` or `entity_id` is required.
        schema:
          type: string
      - name: pattern_id
        in: query
        required: false
        description: Optional built-in correlation pattern filter applied after event or entity scoping.
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Maximum number of correlations and anomalies to return (1-200).
        schema:
          type: integer
          minimum: 1
          maximum: 200
      - name: include_anomalies
        in: query
        required: false
        description: Include anomaly summaries in the response. Defaults to false to avoid broad read-path scans.
        schema:
          type: boolean
          default: false
      - name: since
        in: query
        required: false
        description: Optional RFC3339 lower bound for effect event time.
        schema:
          type: string
          format: date-time
      - name: until
        in: query
        required: false
        description: Optional RFC3339 upper bound for effect event time.
        schema:
          type: string
          format: date-time
    responses:
      '200':
        description: Correlated event links
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCorrelationResult'
      '400':
        description: Invalid query parameter
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/platform/intelligence/event-chains:
  get:
    tags:
      - Platform
    summary: Traverse multi-step event correlation chains
    description: Returns bounded upstream or downstream causal chains for one event or entity scope without requiring clients to recompute transitive lineage.
    parameters:
      - name: event_id
        in: query
        required: false
        description: Event node ID seed for causal chain traversal. Either `event_id` or `entity_id` is required.
        schema:
          type: string
      - name: entity_id
        in: query
        required: false
        description: Entity ID scope (for example `service:payments`) used to seed causal chain traversal. Either `event_id` or `entity_id` is required.
        schema:
          type: string
      - name: pattern_id
        in: query
        required: false
        description: Optional built-in correlation pattern filter applied before traversal.
        schema:
          type: string
      - name: direction
        in: query
        required: false
        description: Traverse upstream causes, downstream effects, or both.
        schema:
          type: string
          enum:
            - upstream
            - downstream
            - both
          default: both
      - name: max_depth
        in: query
        required: false
        description: Maximum number of causal edges per returned chain (1-6).
        schema:
          type: integer
          minimum: 1
          maximum: 6
          default: 4
      - name: limit
        in: query
        required: false
        description: Maximum number of returned chains (1-200).
        schema:
          type: integer
          minimum: 1
          maximum: 200
      - name: since
        in: query
        required: false
        description: Optional RFC3339 lower bound for effect event time.
        schema:
          type: string
          format: date-time
      - name: until
        in: query
        required: false
        description: Optional RFC3339 upper bound for effect event time.
        schema:
          type: string
          format: date-time
    responses:
      '200':
        description: Correlated event chains
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCorrelationChainResult'
      '400':
        description: Invalid query parameter
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
