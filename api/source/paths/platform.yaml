/api/v1/platform/graph/diffs:
  post:
    tags:
      - Platform
    summary: Build a typed diff between two graph snapshot resources
    description: Compare two materialized graph snapshot artifacts by stable snapshot IDs instead of timestamp probing.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PlatformGraphDiffRequest'
    responses:
      '200':
        description: Graph snapshot diff resource
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformGraphSnapshotDiffRecord'
      '202':
        description: Async graph snapshot diff job accepted
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformJob'
      '400':
        description: Invalid request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: One or both graph snapshots were not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '409':
        description: One or both graph snapshots are not materialized and cannot be diffed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/platform/graph/diffs/{diff_id}:
  get:
    tags:
      - Platform
    summary: Get one materialized graph snapshot diff artifact
    parameters:
