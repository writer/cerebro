  get:
    tags:
      - Platform
    summary: Build a unified execution timeline across evaluation and playbook workflows
    description: Return one chronological execution timeline across evaluation and playbook workflows, including communication, decisions, actions, outcomes, claims, and directly linked evidence.
    parameters:
      - name: window_days
        in: query
        required: false
        description: Timeline window in days to include in the report (1-365).
        schema:
          type: integer
          minimum: 1
          maximum: 365
      - name: max_events
        in: query
        required: false
        description: Maximum number of events to return in chronological order (1-1000).
        schema:
          type: integer
          minimum: 1
          maximum: 1000
      - name: tenant_id
        in: query
        required: false
        description: Optional tenant identifier to scope the timeline to one tenant.
        schema:
          type: string
      - name: target_kind
        in: query
        required: false
        description: Optional ontology target kind to scope events touching that kind.
        schema:
          type: string
      - name: playbook_id
        in: query
        required: false
        description: Optional playbook identifier to scope one playbook workflow.
        schema:
          type: string
      - name: evaluation_run_id
        in: query
        required: false
        description: Optional evaluation run identifier to scope one evaluation workflow.
        schema:
          type: string
    responses:
      '200':
        description: Unified execution timeline report
        content:
          application/json:
            schema:
              type: object
      '400':
        description: Invalid query parameter
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
