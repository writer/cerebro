/api/v1/agent-sdk/tools:
  get:
    tags:
      - AgentSDK
    summary: List Agent SDK tools
    description: List the public Agent SDK tool catalog backed by the shared curated Cerebro tool registry.
    responses:
      '200':
        description: Agent SDK tool catalog
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AgentSDKToolDefinition'
/api/v1/agent-sdk/tools/{tool_id}:call:
  post:
    tags:
      - AgentSDK
    summary: Invoke one Agent SDK tool
    description: Invoke a public Agent SDK tool by its stable external identifier.
    parameters:
      - name: tool_id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    responses:
      '200':
        description: Tool invocation completed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSDKToolInvokeResponse'
      '400':
        description: Invalid tool input
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '403':
        description: Insufficient permissions for this tool
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Tool not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '409':
        description: Tool requires approval before execution
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/agent-sdk/context/{entity_id}:
  get:
    tags:
      - AgentSDK
    summary: Get entity context card
    parameters:
      - name: entity_id
        in: path
        required: true
        schema:
          type: string
      - name: sections
        in: query
        schema:
          type: string
        description: Comma-separated section list overriding default sections.
      - name: include_relationships
        in: query
        schema:
          type: boolean
      - name: include_activity
        in: query
        schema:
          type: boolean
    responses:
      '200':
        description: Context card
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSDKContextCard'
      '400':
        description: Invalid entity identifier or query parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Entity not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/agent-sdk/report:
  post:
    tags:
      - AgentSDK
    summary: Execute one platform intelligence report through the Agent SDK
    description: Start a durable platform report run from the Agent SDK surface with optional async execution and report-run status tracking.
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgentSDKReportRequest'
    responses:
      '201':
        description: Synchronous report run created and completed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformReportRun'
      '202':
        description: Asynchronous report run accepted
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformReportRun'
      '400':
        description: Invalid report request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Report definition not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '500':
        description: Report execution failed after run creation
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformReportRun'
