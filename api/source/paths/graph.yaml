/api/v1/impact-analysis:
  post:
    tags:
      - Graph
    summary: Run impact analysis
    description: Analyze cascading impact paths from a starting node under a selected business scenario.
    responses:
      '200':
        description: Impact analysis result
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '400':
        description: Invalid request
        content: &id001
          application/json:
            schema:
              type: object
              additionalProperties: true
      '503':
        description: Graph unavailable
        content: &id001
          application/json:
            schema:
              type: object
              additionalProperties: true
    parameters:
      - name: max_depth
        in: query
        required: false
        schema:
          type: integer
          default: 6
        description: Override traversal depth for this request.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - start_node
              - scenario
            properties:
              start_node:
                type: string
                description: Starting node ID for traversal.
              scenario:
                type: string
                enum:
                  - churn_cascade
                  - revenue_impact
                  - incident_blast_radius
              max_depth:
                type: integer
                default: 6
