/api/v1/attack-paths:
  get:
    tags:
      - Graph
    summary: List attack paths
    description: Enumerate modeled attack paths and aggregate counts.
    responses:
      '200':
        description: Attack path list
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
/api/v1/attack-paths/analyze:
  post:
    tags:
      - Graph
    summary: Analyze attack paths
    description: Run an attack-path analysis against optional high-value targets.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AttackPathAnalyzeRequest'
    responses:
      '200':
        description: Analysis results
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '400':
        description: Invalid analysis request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/attack-paths/graph:
  get:
    tags:
      - Graph
    summary: Get attack graph nodes
    description: Return the current attack graph node inventory.
    responses:
      '200':
        description: Graph node list
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
/api/v1/attack-paths/graph/edges:
  post:
    tags:
      - Graph
    summary: Add attack graph edge
    description: Add a directed edge between attack graph nodes.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    responses:
      '201':
        description: Edge created
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '400':
        description: Invalid edge payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/attack-paths/graph/nodes:
  post:
    tags:
      - Graph
    summary: Add attack graph node
    description: Add a node to the configured attack graph backend.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    responses:
      '201':
        description: Node created
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '400':
        description: Invalid node payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/attack-paths/{id}:
  get:
    tags:
      - Graph
    summary: Get attack path by ID
    description: Return a specific computed attack path.
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Attack path ID
      - name: max_depth
        in: query
        required: false
        schema:
          type: integer
        description: Optional maximum traversal depth
      - name: targets
        in: query
        required: false
        schema:
          type: string
        description: Comma-separated list of target node IDs
    responses:
      '200':
        description: Attack path details
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '404':
        description: Attack path not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
/api/v1/security/analyses/attack-paths/jobs:
  post:
    tags:
      - Security
    summary: Start an asynchronous attack-path analysis job
    description: Queue a security attack-path analysis and return a platform job resource for status and results.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SecurityAttackPathJobRequest'
    responses:
      '202':
        description: Attack-path job accepted
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformJob'
      '400':
        description: Invalid request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '503':
        description: Graph platform is not initialized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
